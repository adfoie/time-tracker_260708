<style>
  :root{
    --paper:#FBF8F1;
    --card:#FFFFFF;
    --ink:#232936;
    --ink-2:#6B7280;
    --line:#E7E1D2;
    --blue:#2B5BB7;
    --blue-soft:#EAF0FB;
    --unrec:#E9E5DA;
    --radius:14px;
    --nav-h:58px;
    --mono:ui-monospace,"SF Mono","Roboto Mono","JetBrains Mono",Menlo,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","HarmonyOS Sans SC","Noto Sans SC","Microsoft YaHei",sans-serif;
    font-size:15px;line-height:1.5;
    max-width:520px;margin:0 auto;
    min-height:100vh;
    padding-bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
    user-select:none;
  }
  header{padding:14px 16px 4px;display:flex;align-items:baseline;justify-content:space-between}
  header h1{font-size:17px;margin:0;letter-spacing:.06em}
  header h1 small{font-size:11px;color:var(--ink-2);font-weight:400;margin-left:8px;letter-spacing:.02em}
  .datebar{display:flex;align-items:center;justify-content:center;gap:4px;padding:2px 8px 8px}
  .datebar button{border:none;background:none;color:var(--ink-2);font-size:20px;width:44px;height:36px;cursor:pointer;border-radius:10px}
  .datebar button:active{background:var(--blue-soft)}
  .datebar .cur{min-width:150px;text-align:center;font-size:15px;font-weight:600;cursor:pointer;padding:4px 10px;border-radius:10px;border:1px dashed transparent}
  .datebar .cur:active{border-color:var(--line)}
  .datebar .cur .hintcal{color:var(--blue);font-size:11px;font-weight:400;margin-left:5px}

  /* ── 标签行 ── */
  .tags{display:flex;gap:8px;overflow-x:auto;padding:6px 16px 12px;scrollbar-width:none}
  .tags::-webkit-scrollbar{display:none}
  .tag{
    flex:0 0 auto;display:flex;align-items:center;gap:6px;
    padding:7px 13px;border-radius:999px;
    background:var(--card);border:1.5px solid var(--line);
    font-size:14px;cursor:pointer;position:relative;transition:transform .08s;
    touch-action:pan-x;
  }
  .tag:active{transform:scale(.94)}
  .tag .dot{width:9px;height:9px;border-radius:50%}
  .tag.running{color:#fff;border-color:transparent;font-weight:600}
  .tag.running .dot{background:#fff !important;animation:pulse 1.2s infinite}
  .tag .elapsed{font-family:var(--mono);font-size:12px;opacity:.9}
  .tag.add{color:var(--ink-2);border-style:dashed}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .taghint{padding:0 18px 6px;font-size:11.5px;color:var(--ink-2)}

  /* ── 记录列表 ── */
  .records{padding:2px 16px 90px}
  .rec{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;margin-bottom:8px;cursor:pointer;position:relative}
  .rec.sel{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-soft)}
  .rec .row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .rec .time{font-family:var(--mono);font-size:14.5px;letter-spacing:.02em}
  .rec .dur{font-family:var(--mono);font-size:12.5px;color:var(--ink-2)}
  .rec .cat{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;padding:2px 9px;border-radius:999px;color:#fff;margin-left:auto}
  .rec .cat.none{background:none;color:var(--ink-2);border:1px dashed var(--line)}
  .rec .note{font-size:13px;color:var(--ink-2);margin-top:5px;white-space:pre-wrap;word-break:break-all}
  .rec .live{color:var(--blue);font-weight:600}
  .rec .expand{margin-top:9px;border-top:1px dashed var(--line);padding-top:9px}
  .rec textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:8px 10px;font:inherit;font-size:13.5px;resize:none;background:var(--paper);color:var(--ink);min-height:64px;user-select:text}
  .rec .exrow{display:flex;align-items:center;justify-content:space-between;margin-top:6px}
  .rec .cnt{font-size:11px;color:var(--ink-2);font-family:var(--mono)}
  .rec .delbtn{border:none;background:none;color:#C2543B;font-size:13px;cursor:pointer;padding:4px 6px}
  .rec .assignhint{font-size:11.5px;color:var(--blue)}
  .empty{text-align:center;color:var(--ink-2);font-size:13.5px;padding:56px 30px;line-height:2}
  .empty .big{font-size:30px;opacity:.4}

  /* ── 编辑模式 ── */
  .editwrap{padding:0 16px 90px;display:none}
  .editwrap .paper{
    background:var(--card);border:1px solid var(--line);border-radius:var(--radius);
    padding:4px 0;position:relative;
    background-image:repeating-linear-gradient(transparent,transparent 27px,var(--line) 27px,var(--line) 28px);
  }
  .editwrap textarea{
    width:100%;border:none;background:transparent;outline:none;resize:none;
    font-family:var(--mono);font-size:14px;line-height:28px;
    padding:0 14px;min-height:140px;color:var(--ink);user-select:text;display:block;overflow:hidden;touch-action:pan-y;
  }
  .editwrap .fmt{
    position:absolute;left:14px;right:14px;
    font-size:11.5px;color:var(--ink-2);line-height:1.9;pointer-events:none;
    background:var(--card);
  }

  /* ── 浮动编辑按钮 ── */
  .fab{
    position:fixed;left:18px;bottom:calc(var(--nav-h) + 18px + env(safe-area-inset-bottom));
    width:52px;height:52px;border-radius:50%;border:none;cursor:pointer;
    background:var(--blue);color:#fff;font-size:21px;
    box-shadow:0 4px 14px rgba(43,91,183,.35);
    display:flex;align-items:center;justify-content:center;
  }
  .fab.done{background:#2E9E63;box-shadow:0 4px 14px rgba(46,158,99,.35)}
  /* idea */
  .fab.fabr{left:auto;right:18px;background:#E0A400;box-shadow:0 4px 14px rgba(224,164,0,.35)}
  .fab.fabr.done{background:#2E9E63;box-shadow:0 4px 14px rgba(46,158,99,.35)}
  .rec.idea{border-left:3px solid #E0A400}
  .rec .cnt.over{color:#C2543B;font-weight:600}
  .rec textarea.over{border-color:#C2543B}
  .wkstar{position:absolute;left:50%;transform:translate(-50%,-50%);color:#E0A400;font-size:14px;cursor:pointer;z-index:5;text-shadow:0 0 3px #fff,0 0 3px #fff}
  .tagmenu .dlgcolor{width:100%;height:46px;border:1px solid var(--line);border-radius:10px;background:var(--card);margin-bottom:13px;padding:4px;cursor:pointer}
  .rec .tag-input:focus{outline:2px solid var(--blue);outline-offset:-1px}
  .rec .exrow .public-toggle{width:16px;height:16px;accent-color:var(--blue);cursor:pointer}
  /* 计划条目 */

  .rec.plan{border-style:dashed;border-width:1.5px;background:transparent}
  .rec.plan .time,.rec.plan .dur{color:var(--ink-2)}
  .wkblock.plan{background:var(--card);border:1.5px dashed;font-weight:600;opacity:.92}
  svg text{font-family:var(--mono)}

  /* ── 统计页 ── */
  .stats{padding:0 16px 30px;display:none}
  .modes{display:flex;justify-content:center;gap:6px;margin:2px 0 10px}
  .modes button{border:1.5px solid var(--line);background:var(--card);color:var(--ink-2);padding:5px 18px;border-radius:999px;font-size:13px;cursor:pointer;font-family:var(--mono)}
  .modes button.on{background:var(--blue);border-color:var(--blue);color:#fff}
  .clockwrap{display:flex;justify-content:center;padding:4px 0 8px}
  .bars{margin-top:14px}
  .bar{display:flex;align-items:center;gap:10px;margin-bottom:11px}
  .bar .name{flex:0 0 76px;display:flex;align-items:center;gap:6px;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bar .dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px}
  .bar .track{flex:1;height:12px;background:var(--card);border:1px solid var(--line);border-radius:99px;overflow:hidden}
  .bar .fill{height:100%;border-radius:99px}
  .bar .val{flex:0 0 96px;text-align:right;font-family:var(--mono);font-size:11.5px;color:var(--ink-2)}

  /* ── 我的页面 ── */
  .me{padding:0 16px 30px;display:none}
  .mecard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
  .mecard h3{font-size:13px;color:var(--ink-2);margin:0 0 12px;font-weight:500}
  .mecard input{
    width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;
    font:inherit;font-size:14.5px;background:var(--paper);color:var(--ink);margin-bottom:10px;user-select:text;
  }
  .mecard .btns{display:flex;gap:10px;margin-top:2px}
  .mecard button{flex:1;border:1.5px solid var(--line);background:var(--card);color:var(--ink);padding:11px;border-radius:11px;font-size:14px;cursor:pointer}
  .mecard button.primary{background:var(--blue);border-color:var(--blue);color:#fff}
  .mecard button.danger{color:#C2543B}
  .mecard .tip{font-size:12px;color:var(--ink-2);line-height:1.8;margin-top:10px}
  .mecard .who{font-size:16px;font-weight:600;margin-bottom:4px}
  .mecard .syncline{font-size:12.5px;color:var(--ink-2);margin-bottom:12px;font-family:var(--mono)}
  .mecard .syncline .ok{color:#2E9E63}
  .mecard .syncline .bad{color:#C2543B}

  /* ── 日历盘 ── */
  .overlay{
    position:fixed;inset:0;background:rgba(35,41,54,.4);z-index:50;
    display:none;align-items:flex-end;justify-content:center;
  }
  .overlay.show{display:flex}
  .sheet{
    background:var(--paper);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;
    border-radius:20px 20px 0 0;padding:14px 16px calc(20px + env(safe-area-inset-bottom));
  }
  .calhead{display:flex;align-items:center;gap:6px;margin-bottom:8px;flex-wrap:wrap;row-gap:6px}
  .calhead .mnav{border:none;background:none;font-size:19px;color:var(--ink-2);width:38px;height:34px;cursor:pointer}
  .calhead .mtitle{font-size:15.5px;font-weight:600;min-width:110px;text-align:center}
  .calhead .spacer{flex:1}
  .calhead .cmode{display:flex;border:1.5px solid var(--line);border-radius:999px;overflow:hidden}
  .calhead .cmode button{border:none;background:var(--card);color:var(--ink-2);font-size:12px;padding:5px 12px;cursor:pointer}
  .calhead .cmode button.on{background:var(--blue);color:#fff}
  .calhead .close{border:none;background:none;font-size:17px;color:var(--ink-2);width:36px;height:34px;cursor:pointer}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:6px}
  .calgrid .wd{text-align:center;font-size:11px;color:var(--ink-2);padding:4px 0}
  .calcell{
    aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:1px;cursor:pointer;position:relative;
  }
  .calcell:active{background:var(--blue-soft)}
  .calcell .dnum{font-size:12px;font-family:var(--mono);color:var(--ink)}
  .calcell.dim .dnum{color:transparent}
  .calcell.today .dnum{color:var(--blue);font-weight:700}
  .calcell.cur{background:var(--blue-soft)}
  .calcell .notedot{width:5px;height:5px;border-radius:50%;background:var(--blue)}
  .calcell svg{display:block}
  .caltotals{margin:10px 0 4px}
  .caltotals h4, .caldiary h4, .calchart h4{font-size:13px;color:var(--ink-2);margin:12px 0 8px;font-weight:500}
  .trow{display:flex;align-items:center;gap:10px;padding:7px 4px;border-radius:10px;cursor:pointer}
  .trow:active{background:var(--blue-soft)}
  .trow .name{flex:0 0 68px;display:flex;align-items:center;gap:6px;font-size:13.5px}
  .trow .dot{width:9px;height:9px;border-radius:50%}
  .trow .track{flex:1;height:10px;background:var(--card);border:1px solid var(--line);border-radius:99px;overflow:hidden}
  .trow .fill{height:100%}
  .trow .val{flex:0 0 92px;text-align:right;font-family:var(--mono);font-size:11.5px;color:var(--ink-2)}
  .trow .arrow{color:var(--ink-2);font-size:12px}
  .caldiary textarea{
    width:100%;border:1px solid var(--line);border-radius:var(--radius);padding:12px 14px;
    font:inherit;font-size:13.5px;line-height:28px;resize:none;min-height:140px;
    background:var(--card);color:var(--ink);user-select:text;
    background-image:repeating-linear-gradient(transparent,transparent 27px,var(--line) 27px,var(--line) 28px);
  }
  .calchart .back{border:none;background:none;color:var(--blue);font-size:13.5px;cursor:pointer;padding:6px 2px}
  .calchart .tipline{font-family:var(--mono);font-size:12.5px;color:var(--ink);text-align:center;margin:4px 0}
  .chartbox{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:10px 8px;margin-bottom:6px}

  /* ── 底部导航 ── */
  nav{
    position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + env(safe-area-inset-bottom));
    background:rgba(251,248,241,.92);backdrop-filter:blur(10px);
    border-top:1px solid var(--line);display:flex;max-width:520px;margin:0 auto;
    padding-bottom:env(safe-area-inset-bottom);z-index:40;
  }
  nav button{flex:1;border:none;background:none;font-size:14px;color:var(--ink-2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
  nav button.on{color:var(--blue);font-weight:600}
  nav button .ico{font-size:17px}

  .toast{
    position:fixed;left:50%;transform:translateX(-50%);
    bottom:calc(var(--nav-h) + 84px);
    background:var(--ink);color:#fff;font-size:13px;
    padding:9px 18px;border-radius:99px;opacity:0;pointer-events:none;
    transition:opacity .25s;white-space:nowrap;z-index:99;
  }
  .toast.show{opacity:.94}
  /* 待办 */
  .todos{padding:0 16px 4px}
  .todo{display:flex;align-items:center;gap:9px;background:var(--card);border:1.5px solid #F0C892;border-radius:11px;padding:8px 12px;margin-bottom:6px;cursor:pointer;font-size:14px}
  .todo .box{width:19px;height:19px;border-radius:6px;border:2px solid #E08A00;background:transparent;color:#fff;font-size:13px;line-height:15px;text-align:center;flex:0 0 19px}
  .todo .txt{flex:1;word-break:break-all;color:var(--ink)}
  .todo.done{border-color:#BFE3D0}
  .todo.done .box{background:#2E9E63;border-color:#2E9E63}
  .todo.done .txt{color:var(--ink-2);text-decoration:line-through}
  .todo.addtodo{border-style:dashed;border-color:var(--line);color:var(--ink-2);justify-content:center}
  .todo .ttime{font-family:var(--mono);font-size:11.5px;color:#B06F00;background:#FBF1E0;padding:2px 8px;border-radius:99px;margin-left:auto;flex:0 0 auto}
  .todo .ttime.due{color:#C2543B;background:#F9E3DC;font-weight:600}
  .todo.done .ttime{color:var(--ink-2);background:var(--paper)}
  /* 标签/待办操作菜单 */
  .tagmenu{background:var(--paper);border-radius:16px;padding:18px 16px;width:86%;max-width:340px}
  .tagmenu .tmtitle{font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:7px;word-break:break-all}
  .tagmenu .dot{width:9px;height:9px;border-radius:50%;flex:0 0 9px}
  .tagmenu .btns{display:flex;gap:9px;flex-wrap:wrap}
  .tagmenu .btns button{min-width:30%}
  .tagmenu button{flex:1;border:1.5px solid var(--line);background:var(--card);color:var(--ink);border-radius:11px;padding:10px 4px;font-size:13.5px;cursor:pointer}
  .tagmenu button.danger{color:#C2543B}
  .tagmenu .dlgin{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font:inherit;font-size:14.5px;background:var(--card);color:var(--ink);margin-bottom:13px;user-select:text}
  /* 心情与日历格 */
  .moodrow{display:flex;align-items:center;gap:8px;font-size:13.5px;color:var(--ink-2);padding:4px 2px;flex-wrap:wrap}
  .moodbtn{border:1.5px solid var(--line);background:var(--card);border-radius:10px;font-size:17px;padding:5px 10px;cursor:pointer}
  .moodbtn.on{border-color:var(--blue);background:var(--blue-soft)}
  .calcell .mood{font-size:12px;line-height:1}
  .tododots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;max-width:34px}
  .tdot{width:4px;height:4px;border-radius:50%}
  /* 统计页备注列表 */
  .barnotes{margin:-5px 0 11px 86px;font-size:12px;color:var(--ink-2)}
  .barnotes summary{cursor:pointer;color:var(--blue);font-size:11.5px;user-select:none}
  .bnitem{padding:4px 0;border-bottom:1px dashed var(--line);white-space:pre-wrap;word-break:break-all}
  .bnitem span{font-family:var(--mono);margin-right:7px;color:var(--ink-2)}
  /* 周视图 */
  .wkhead,.wktodos{display:grid;grid-template-columns:34px repeat(7,1fr);gap:2px}
  .wkhead{margin-top:2px}
  .wkday{text-align:center;cursor:pointer;padding:3px 0;border-radius:8px}
  .wkday:active{background:var(--blue-soft)}
  .wkday .wdn{display:block;font-size:10px;color:var(--ink-2)}
  .wkday .wnum{display:block;font-size:13px;font-family:var(--mono)}
  .wkday.today .wnum{color:var(--blue);font-weight:700}
  .wtcell{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;align-content:flex-start;min-height:10px}
  .wtcell.exp{display:block}
  .wtitem{font-size:9.5px;background:#FBF1E0;color:#B06F00;border-radius:4px;padding:1px 3px;margin-bottom:2px;word-break:break-all;line-height:1.3}
  .wtitem.d{background:#E7F4EC;color:#2E9E63;text-decoration:line-through}
  .wkctl{display:flex;gap:8px;margin:8px 0 2px}
  .wkctl button{border:1.5px solid var(--line);background:var(--card);border-radius:99px;font-size:12px;padding:4px 12px;cursor:pointer;color:var(--ink-2)}
  .weekgrid{display:grid;grid-template-columns:34px repeat(7,1fr);gap:2px;position:relative;background:var(--card);border:1px solid var(--line);border-radius:12px;margin-top:4px}
  .wkhours{position:relative}
  .wkhr{position:absolute;left:0;right:0;height:0}
  .wkhr span{position:absolute;top:-6px;left:3px;font-size:9px;color:var(--ink-2);font-family:var(--mono)}
  .wkcol{position:relative}
  .wkblock{position:absolute;left:1px;right:1px;border-radius:4px;color:#fff;font-size:9.5px;line-height:1.25;padding:1px 3px;overflow:hidden;cursor:pointer;opacity:.95}
  .wkblock.imp{opacity:.5}
  /* 计划条目 */
  .rec.plan{border-style:dashed;border-width:1.5px;background:transparent}
  .rec.plan .time,.rec.plan .dur{color:var(--ink-2)}
  .wkblock.plan{background:var(--card);border:1.5px dashed;font-weight:600;opacity:.92}
  svg text{font-family:var(--mono)}
  /* 3D 星球 */
  #socOverlay{z-index:65}
  #planetOverlay{position:fixed;inset:0;z-index:60;display:none;background:radial-gradient(ellipse at 50% 35%, #141B33 0%, #0A0E1D 70%, #060912 100%)}
  #plCanvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
  .plhead{position:absolute;top:0;left:0;right:0;display:flex;flex-wrap:wrap;row-gap:8px;gap:8px;align-items:center;padding:14px 14px 0;z-index:2;padding-top:calc(14px + env(safe-area-inset-top))}

<script>
/* ═══════════ 状态与存储 ═══════════ */
const LS_KEY = 'tt_state_v1';
let curUid = null;                               // 当前数据槽归属的账号
function lsKeyFor(uid){ return uid ? 'tt_state_u_'+uid : LS_KEY; }
const PALETTE = ['#C2543B','#0E8B8B','#8A6D2F','#5B7F2B','#A04FB5','#3E7BC4','#B5484D','#3A8F6E'];
const DEFAULT_CATS = [
  {id:'work',  name:'工作', color:'#2B5BB7', builtin:true},
  {id:'study', name:'学习', color:'#7C4DBE', builtin:true},
  {id:'chill', name:'休闲', color:'#E08A00', builtin:true},
  {id:'sport', name:'运动', color:'#2E9E63', builtin:true},
  {id:'sleep', name:'睡眠', color:'#3E4C8A', builtin:true},
  {id:'social',name:'社交', color:'#D9548A', builtin:true},
  {id:'rest',  name:'休息', color:'#98A0AB', builtin:true},
  {id:'wake',  name:'起床', color:'#E0A400', builtin:true},
  {id:'gn',    name:'晚安', color:'#1F7A5C', builtin:true},
];
function ensureDefaults(s){
  if(!s.cats) s.cats=[];
  if(!s.recs) s.recs={};
  if(!s.diary) s.diary={};
  if(!s.dayDiary) s.dayDiary={};
  if(!s.todos) s.todos={};
  if(!s.weekDiary) s.weekDiary={};
  if(!s.mode) s.mode='all';
  ['rest','wake','gn'].forEach(id=>{
    if(!s.cats.find(c=>c.id===id)) s.cats.push(JSON.parse(JSON.stringify(DEFAULT_CATS.find(c=>c.id===id))));
  });
  return s;
}
let S = load();
// v12-修改1：     
// function load(){
//   try{
//     const raw = localStorage.getItem(lsKeyFor(curUid));
//     if(raw){ const s = JSON.parse(raw); if(s && s.cats) return ensureDefaults(s); }
//   }catch(e){}
//   return ensureDefaults({ cats: JSON.parse(JSON.stringify(DEFAULT_CATS)), recs:{}, diary:{}, mode:'all' });
// }
     function load(){
  try{
    const raw = localStorage.getItem(lsKeyFor(curUid));
    if(raw){ 
      const s = JSON.parse(raw); 
      if(s && s.cats) {
        // ★ 数据迁移：将 isPublic 转为 pub
        if(s.recs){
          Object.keys(s.recs).forEach(k => {
            (s.recs[k]||[]).forEach(r => {
              if(r.idea && r.isPublic !== undefined) {
                r.pub = r.isPublic;
                delete r.isPublic;
              }
            });
          });
        }
        return ensureDefaults(s); 
      }
    }
  }catch(e){}
  return ensureDefaults({ cats: JSON.parse(JSON.stringify(DEFAULT_CATS)), recs:{}, diary:{}, mode:'all' });
}
function save(){
  S.updatedAt = Date.now();
  try{ localStorage.setItem(lsKeyFor(curUid), JSON.stringify(S)); }catch(e){ toast('本机存储失败'); }
  schedulePush();
}
function saveLocalOnly(){
  try{ localStorage.setItem(lsKeyFor(curUid), JSON.stringify(S)); }catch(e){}
}
/* 切换账号数据槽：存回旧槽 → 换槽 → 读新槽 */
function switchUser(uid){
  if(uid===curUid) return;
  saveLocalOnly();
  curUid = uid;
  S = load();
  selRec=null;
  renderAll();
  if(curPage==='me') renderMe();
}

/* ═══════════ 工具函数 ═══════════ */
const $ = id => document.getElementById(id);
const pad = n => String(n).padStart(2,'0');
function todayKey(){ const d=new Date(); return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function keyToDate(k){ const [y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function shiftDay(k,n){ const d=keyToDate(k); d.setDate(d.getDate()+n);
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }
function hmToMin(hm){ const [h,m]=hm.split(':').map(Number); return h*60+m; }
function nowHM(){ const d=new Date(); return pad(d.getHours())+':'+pad(d.getMinutes()); }
function nowMin(){ const d=new Date(); return d.getHours()*60+d.getMinutes(); }
function fmtDur(min){
  min=Math.round(min);
  if(min<60) return min+'min';
  const h=Math.floor(min/60), m=min%60;
  return m ? h+'h'+m+'m' : h+'h';
}
function dotHM(hm){ return hm.replace(':','.'); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function catById(id){ return S.cats.find(c=>c.id===id)||null; }
function catByName(name){
  if(/^[xX×]$/.test(name)) return S.cats.find(c=>c.id==='rest');
  return S.cats.find(c=>c.name===name)||null;
}
function dayRecs(k){ if(!S.recs[k]) S.recs[k]=[]; return S.recs[k]; }
function isWake(r){ return r.cat==='wake'; }
function isMarker(r){ return r.cat==='wake' || r.cat==='gn'; }
function recDur(r, dateKey){
  if(isMarker(r) || r.idea) return 0;
  const s = hmToMin(r.start);
  let e;
  if(r.end==null){
    if(dateKey!==todayKey()) return 0;
    e = nowMin();
  } else e = hmToMin(r.end);
  if(e < s) e += 1440;
  return e - s;
}
function recSegs(r, dateKey){
  if(isMarker(r) || r.plan || r.idea) return [];
  const s = hmToMin(r.start);
  let e;
  if(r.end==null){
    if(dateKey!==todayKey()) return [];
    e = nowMin();
    if(e<s) e=1440;
  } else e = hmToMin(r.end);
  if(e >= s) return e>s ? [[s,e]] : [];
  return [[s,1440],[0,e]];
}
/* 原始时间段（无视计划标志，供周视图绘制计划块） */
function rawSegs(r, dateKey){
  const s = hmToMin(r.start);
  let e = r.end==null ? s : hmToMin(r.end);
  if(e >= s) return e>s ? [[s,e]] : [];
  return [[s,1440],[0,e]];
}
function absDay(k){ return Math.round(keyToDate(k).getTime()/86400000); }
let _spCache=null, _spAt=-1;
/* 全局睡眠区间：晚安→之后第一个起床 按时间顺序配对；
   连续两次晚安（中间无起床）以最后一次为准；单段上限16小时 */
function sleepPeriods(){
  if(_spCache && _spAt===(S.updatedAt||0)) return _spCache;
  const marks=[];
  Object.keys(S.recs).forEach(k=>{
    const base=absDay(k)*1440;
    (S.recs[k]||[]).forEach(r=>{
      if(r.cat==='gn' || r.cat==='wake')
        marks.push({t:base+hmToMin(r.start), kind:r.cat});
    });
  });
  marks.sort((a,b)=>a.t-b.t);
  const ps=[]; let pending=null;
  marks.forEach(m=>{
    if(m.kind==='gn') pending=m.t;
    else if(pending!=null){
      const d=m.t-pending;
      if(d>0 && d<=960) ps.push({start:pending, end:m.t});
      pending=null;
    }
  });
  ps.pending=pending;              // 已打晚安、尚未起床（今晚正在睡）
  _spCache=ps; _spAt=S.updatedAt||0;
  return ps;
}
/* 某天的起床时刻：当天第一个起床打点 */
function wakeValOf(k){
  const ws=(S.recs[k]||[]).filter(r=>r.cat==='wake').map(r=>hmToMin(r.start)).sort((a,b)=>a-b);
  return ws.length ? ws[0] : null;
}
/* 某天的入睡时刻：归属窗口 = 当天4:00→次日4:00，取窗口内最后一次入睡；
   >=1440 表示熬到次日凌晨 */
function gnValOf(k){
  const base=absDay(k)*1440, w0=base+240, w1=base+1680;
  const ps=sleepPeriods();
  const starts=ps.filter(p=>p.start>=w0 && p.start<w1).map(p=>p.start);
  if(ps.pending!=null && ps.pending>=w0 && ps.pending<w1) starts.push(ps.pending);
  if(!starts.length) return null;
  return Math.max(...starts)-base;
}
/* 某天的累计睡眠时长：该日晚间（4:00→次日4:00窗口）入睡的睡眠段之和；无配对则空 */
function sleepDurOf(k){
  const base=absDay(k)*1440, w0=base+240, w1=base+1680;
  let tot=0;
  sleepPeriods().forEach(p=>{ if(p.start>=w0 && p.start<w1) tot+=p.end-p.start; });
  return tot>0 ? tot : null;
}
/* 起床与晚安之间默认睡眠（扣除已有记录覆盖的时段，避免重复计时） */
function implicitSleepSegs(k){
  const rs=S.recs[k]||[];
  const base=absDay(k)*1440;
  const raw=[];
  sleepPeriods().forEach(p=>{
    const s=Math.max(p.start, base), e=Math.min(p.end, base+1440);
    if(e>s) raw.push([s-base, e-base]);
  });
  if(!raw.length) return [];
  const cover=[];
  rs.forEach(r=>{ if(!isMarker(r)) recSegs(r,k).forEach(sg=>cover.push(sg)); });
  cover.sort((a,b)=>a[0]-b[0]);
  const out=[];
  raw.forEach(([s,e])=>{
    let cur=s;
    cover.forEach(([cs,ce])=>{
      if(ce<=cur || cs>=e) return;
      if(cs>cur) out.push([cur,Math.min(cs,e)]);
      cur=Math.max(cur,ce);
    });
    if(cur<e) out.push([cur,e]);
  });
  return out.filter(([s,e])=>e-s>=1);
}

/* ═══════════ 全局视图状态 ═══════════ */
let viewDate = todayKey();
let selRec = null;
let editMode = false;
let curPage = 'record';
let clockSel = null;                    // 钟面选中的色块
let ideaMode = false, ideaTime = null;  // idea 记录模式
let filterTag = null;          // null=全部, '_uncat'=未分类, 其他=标签id
let showIdea = true;
let showTodo = true;
let showTimeline = true;
let showIdeaOnClock = true;    // 时钟星标开关
let calMonth = viewDate.slice(0,7);     // 'YYYY-MM'
let calMode = 'stat';                   // 'stat' | 'diary'
let calTag = null;                      // 查看某标签的月度图表
let calView = 'month';                  // 'month' | 'week'
let calWeekStart = null;                // 周视图的周一日期
let weekZoom = 26;                      // 周时间线：每小时像素
let weekTodoExpand = false;

function runningRec(){
  const rs = dayRecs(todayKey());
  return rs.find(r => r.end==null && !isMarker(r) && !r.plan && !r.idea) || null;
}

/* ═══════════ 顶部日期栏 ═══════════ */
const WEEK = ['日','一','二','三','四','五','六'];
function renderDate(){
  const d = keyToDate(viewDate);
  const isToday = viewDate===todayKey();
  $('dCur').innerHTML = (d.getMonth()+1)+'月'+d.getDate()+'日 周'+WEEK[d.getDay()]
    + (isToday ? '<span class="hintcal">▾</span>' : '<span class="hintcal" id="goToday">跳转至今天</span>');
  const g=$('goToday');
  if(g) g.onclick=(e)=>{ e.stopPropagation(); viewDate=todayKey(); selRec=null; exitEdit(true); exitIdea(true); renderAll(); };
}
$('dPrev').onclick = ()=>{ viewDate=shiftDay(viewDate,-1); exitEdit(true); exitIdea(true); selRec=null; renderAll(); };
$('dNext').onclick = ()=>{ viewDate=shiftDay(viewDate, 1); exitEdit(true); exitIdea(true); selRec=null; renderAll(); };
$('dCur').onclick  = openCal;
$('tagRow').addEventListener('wheel', e=>{
  e.preventDefault();
  $('tagRow').scrollLeft += (e.deltaY||0) + (e.deltaX||0);
}, {passive:false});

/* ═══════════ 标签行（单击/双击/长按） ═══════════ */
let tapTimer=null, tapCat=null;
function renderTags(){
  const row = $('tagRow');
  row.innerHTML='';
  const run = runningRec();
     
  // ★ 先添加"未分类"标签（不参与实际分类，仅用于筛选）
  const uncatEl = document.createElement('div');
  uncatEl.className = 'tag';
  uncatEl.innerHTML = `<span class="dot" style="background:#C9C4B6;border:1px solid var(--line)"></span>未分类`;
  uncatEl.dataset.uncat = 'true';
  uncatEl.onclick = ()=>{
    // 点击未分类：筛选出 cat==null 且不是 idea 的记录
    filterTag = '_uncat';
    renderRecs();
    // 高亮
    row.querySelectorAll('.tag').forEach(t=>t.style.border='1.5px solid var(--line)');
    uncatEl.style.border = '2px solid var(--blue)';
  };
  row.appendChild(uncatEl);
  
  // 原有标签循环
  S.cats.forEach(c=>{
    if(c.hidden) return;
    const el = document.createElement('div');
    el.className='tag';
    const isRun = run && run.cat===c.id;
    if(isRun){
      el.classList.add('running');
      el.style.background = c.color;
      el.innerHTML = `<span class="dot"></span>${c.name}<span class="elapsed">${fmtDur(recDur(run, todayKey()))}</span>`;
    } else {
      el.innerHTML = `<span class="dot" style="background:${c.color}"></span>${c.name}`;
    }
    el.dataset.catId = c.id;
    el.onclick = ()=>{
      filterTag = c.id;
      renderRecs();
      row.querySelectorAll('.tag').forEach(t=>t.style.border='1.5px solid var(--line)');
      el.style.border = '2px solid var(--blue)';
    };
    attachTagEvents(el, c);
    row.appendChild(el);
  });
  const add=document.createElement('div');
  add.className='tag add'; add.textContent='＋ 标签';
  add.onclick=addCat;
  row.appendChild(add);
}
function attachTagEvents(el, c){
  let lpTimer=null, longPressed=false, sx=0, sy=0;
  el.addEventListener('pointerdown', e=>{
    longPressed=false; sx=e.clientX; sy=e.clientY;
    lpTimer=setTimeout(()=>{ longPressed=true; lpTimer=null;
      if(navigator.vibrate) navigator.vibrate(30);
      tagMenu(c);
    }, 600);
  });
  el.addEventListener('pointermove', e=>{
    if(lpTimer && (Math.abs(e.clientX-sx)>12 || Math.abs(e.clientY-sy)>12)){
      clearTimeout(lpTimer); lpTimer=null;
    }
  });
  ['pointerup','pointercancel','pointerleave'].forEach(ev=>
    el.addEventListener(ev, ()=>{ if(lpTimer){clearTimeout(lpTimer);lpTimer=null;} }));
  el.addEventListener('click', ()=>{ if(longPressed) return; onTagTap(c); });
  el.addEventListener('contextmenu', e=>e.preventDefault());
}
function onTagTap(c){
  if(tapTimer && tapCat===c.id){
    clearTimeout(tapTimer); tapTimer=null; tapCat=null;
    toggleTimer(c);
  } else {
    if(tapTimer) clearTimeout(tapTimer);
    tapCat=c.id;
    tapTimer=setTimeout(()=>{ tapTimer=null; tapCat=null; assignCat(c); }, 280);
  }
}
async function addCat(){
  const name = await uiPrompt('新建标签','新标签名称（如：阅读）');
  if(!name) return;
  const nm = name.trim().slice(0,6);
  if(!nm) return;
  const dup=catByName(nm);
  if(dup){
    if(dup.hidden){ dup.hidden=false; save(); renderAll(); toast(`已恢复隐藏的标签「${nm}」`); }
    else toast('已有同名标签');
    return;
  }
  const used = S.cats.filter(c=>!c.builtin).length;
  S.cats.push({id:uid(), name:nm, color:PALETTE[used % PALETTE.length], builtin:false});
  save(); renderAll();
}

/* ═══════════ 计时（双击） ═══════════ */
function toggleTimer(c){
  if(editMode){ toast('先点 ✓ 退出编辑模式'); return; }
  const tk = todayKey();
  if(c.id==='wake' || c.id==='gn'){         // 起床/晚安：打一个时间点标记
    const label = c.id==='wake' ? '起床' : '入睡';
    const rs = dayRecs(tk);
    let suffix='', w;
    if(c.id==='gn'){
      const early = nowMin()<240;             // 凌晨0-4点 = 前一天晚间的入睡
      if(early){
        const td=keyToDate(shiftDay(tk,-1));
        suffix=`（视为${td.getMonth()+1}月${td.getDate()}日晚的入睡）`;
      }
      w = rs.find(r=>r.cat==='gn' && (hmToMin(r.start)<240)===early);
    } else {
      w = rs.find(r=>r.cat==='wake');
    }
    if(w){ w.start=nowHM(); toast('已更新'+label+' '+w.start+suffix); }
    else { rs.push({id:uid(), start:nowHM(), end:null, cat:c.id, note:''}); toast('已记录'+label+' '+nowHM()+suffix); }
    if(viewDate!==tk) viewDate=tk;
    save(); renderAll(); return;
  }
  const run = runningRec();
  if(run && run.cat===c.id){
    run.end = nowHM();
    if(run.end===run.start){
      const rs=dayRecs(tk); rs.splice(rs.indexOf(run),1);
      toast('不足 1 分钟，未记录');
    } else toast(`${c.name} 结束 · ${fmtDur(recDur(run,tk))}`);
  } else {
    if(run){
      run.end = nowHM();
      if(run.end===run.start){ const rs=dayRecs(tk); rs.splice(rs.indexOf(run),1); }
    }
    dayRecs(tk).push({id:uid(), start:nowHM(), end:null, cat:c.id, note:''});
    toast(`${c.name} 开始计时`);
    if(viewDate!==tk) viewDate=tk;
  }
  save(); renderAll();
}

/* ═══════════ 单击：设置分类 ═══════════ */
function assignCat(c){
  if(editMode){ toast('编辑模式下直接在文字里写分类'); return; }
  if(c.id==='wake'||c.id==='gn'){ toast('「'+c.name+'」是时间点标记，请双击打点'); return; }
  const rs = dayRecs(viewDate);
  let target = selRec ? rs.find(r=>r.id===selRec) : null;
  if(!target){
    const untagged = rs.filter(r=>r.cat==null && !r.idea);
    target = untagged.length ? untagged[untagged.length-1] : null;
  }
  if(!target){ toast('先双击开始计时，或点 ✎ 补录'); return; }
  target.cat = c.id;
  save(); renderAll();
  toast(`已设为「${c.name}」`);
}

/* ═══════════ 待办 ═══════════ */
function dayTodos(k){ if(!S.todos[k]) S.todos[k]=[]; return S.todos[k]; }
function renderTodos(){
  const wrap=$('todoWrap');
  if(!showTodo){
    wrap.innerHTML = '';
    return;
  }
  const ts=dayTodos(viewDate);
  let html='';
  ts.forEach(t=>{
    const due = t.time && !t.done && viewDate===todayKey() && nowMin()>=hmToMin(t.time);
    html+=`<div class="todo ${t.done?'done':''}" data-id="${t.id}">
      <span class="box">${t.done?'✓':''}</span>
      <span class="txt">${escHtml(t.text)}</span>
      ${t.time?`<span class="ttime${due?' due':''}">⏰ ${t.time}</span>`:''}</div>`;
  });
  html+=`<div class="todo addtodo" id="addTodo" title="单击待办打勾，双击或长按打开菜单">＋ 添加待办</div>`;
  wrap.innerHTML=html;
  wrap.querySelectorAll('.todo[data-id]').forEach(el=>{
    const t=ts.find(x=>x.id===el.dataset.id);
    let lp=null, fired=false, tapTm=null;
    el.addEventListener('pointerdown',()=>{
      fired=false;
      lp=setTimeout(()=>{ fired=true; lp=null;
        if(navigator.vibrate) navigator.vibrate(30);
        todoMenu(t);
      }, 600);
    });
    ['pointerup','pointercancel','pointerleave','pointermove'].forEach(ev=>
      el.addEventListener(ev, ()=>{ if(lp){clearTimeout(lp);lp=null;} }));
    el.addEventListener('click',()=>{
      if(fired) return;
      if(tapTm){                                   // 双击：打开菜单
        clearTimeout(tapTm); tapTm=null;
        todoMenu(t);
      } else {                                     // 单击：延迟后打勾
        tapTm=setTimeout(()=>{ tapTm=null; t.done=!t.done; save(); renderTodos(); }, 280);
      }
    });
    el.addEventListener('contextmenu',e=>e.preventDefault());
  });
  $('addTodo').onclick=async ()=>{
    const txt=await uiPrompt('添加待办','待办内容');
    if(!txt||!txt.trim()) return;
    const item={id:uid(), text:txt.trim().slice(0,50), done:false};
    const v=await uiPrompt('提醒时间','24小时制，如 09:00；留空不提醒','');
    if(v && v.trim()){
      const norm=normalizeTime(v.trim());
      if(norm){ item.time=norm; item.notified=false; askNotifyPerm(); }
      else toast('时间格式不对，已跳过提醒');
    }
    dayTodos(viewDate).push(item);
    save(); renderTodos();
  };

/* ═══════════ 待办提醒 ═══════════ */
function normalizeTime(s){
  const m=s.match(/^(\d{1,2})[:.：](\d{1,2})$/);
  if(!m) return null;
  const h=+m[1], mi=+m[2];
  if(h>23||mi>59) return null;
  return pad(h)+':'+pad(mi);
}
function askNotifyPerm(){
  if('Notification' in window && Notification.permission==='default'){
    Notification.requestPermission();
  }
}
async function setReminder(t){
  const v=await uiPrompt('提醒时间','24小时制，如 09:00；留空取消提醒', t.time||'');
  if(v===null) return;
  const tm=v.trim();
  if(!tm){ delete t.time; delete t.notified; save(); renderTodos(); toast('已取消提醒'); return; }
  const norm=normalizeTime(tm);
  if(!norm){ toast('时间格式应如 09:00'); return; }
  t.time=norm; t.notified=false;
  askNotifyPerm();
  save(); renderTodos();
  toast('将于 '+norm+' 提醒（需应用保持打开）');
}
function checkReminders(){
  const k=todayKey();
  let hit=false;
  (S.todos[k]||[]).forEach(t=>{
    if(!t.time || t.done || t.notified) return;
    if(nowMin() >= hmToMin(t.time)){
      t.notified=true; hit=true;
      fireNotify('待办提醒', t.text+'（'+t.time+'）');
    }
  });
  if(hit){ save(); if(curPage==='record') renderTodos(); }
}
function fireNotify(title, body){
  toast('⏰ '+body);
  if(navigator.vibrate) navigator.vibrate([200,100,200]);
  if('Notification' in window && Notification.permission==='granted'){
    const opts={body, icon:'icon-192.png', badge:'icon-192.png', tag:'tt-todo'};
    if(navigator.serviceWorker && navigator.serviceWorker.getRegistration){
      navigator.serviceWorker.getRegistration().then(reg=>{
        if(reg && reg.showNotification) reg.showNotification(title, opts);
        else { try{ new Notification(title, opts); }catch(e){} }
      });
    } else { try{ new Notification(title, opts); }catch(e){} }
  }
}
function todoToIcs(t){
  const day=viewDate.replace(/-/g,'');
  const startMin=hmToMin(t.time), endMin=Math.min(startMin+30, 1439);
  const fmt=m=>pad(Math.floor(m/60))+pad(m%60)+'00';
  const ics=['BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//timeapp//CN','BEGIN:VEVENT',
    'UID:'+t.id+'@timeapp',
    'DTSTART:'+day+'T'+fmt(startMin),
    'DTEND:'+day+'T'+fmt(endMin),
    'SUMMARY:'+t.text.replace(/[\r\n,;]/g,' '),
    'BEGIN:VALARM','TRIGGER:-PT10M','ACTION:DISPLAY',
    'DESCRIPTION:'+t.text.replace(/[\r\n,;]/g,' '),
    'END:VALARM','END:VEVENT','END:VCALENDAR'].join('\r\n');
  const blob=new Blob([ics],{type:'text/calendar'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='提醒-'+t.text.slice(0,10)+'.ics';
  a.click(); URL.revokeObjectURL(a.href);
  toast('已生成日历文件，打开它导入手机日历');
}

function serializeDay(k){
  const rs = dayRecs(k).filter(r=>!r.idea).sort((a,b)=>hmToMin(a.start)-hmToMin(b.start));
  return rs.map(r=>{
    const c = r.cat ? catById(r.cat) : null;
    const cname = c ? (c.id==='rest' ? 'X' : c.name) : '';
    const t = (r.plan?'。':'') + (r.end==null ? dotHM(r.start) : dotHM(r.start)+'-'+dotHM(r.end));
    const noteLines = (r.note||'').split('\n');
    let line = [t, cname, noteLines[0]||''].filter(Boolean).join(' ');
    for(let i=1;i<noteLines.length;i++) line += '\n    '+noteLines[i];
    return line;
  }).join('\n');
}
const RE_RANGE  = /^(\d{1,2})[.:：](\d{1,2})\s*[-—–~至]+\s*(\d{1,2})[.:：](\d{1,2})\s*(.*)$/;
const RE_SINGLE = /^(\d{1,2})[.:：](\d{1,2})\s*(.*)$/;
const RE_CONT   = /^( {4,}|\u3000{2,})\S/;      // 行首空4格（或2个全角空格）= 备注续行
function validHM(h,m){ return h>=0 && h<=24 && m>=0 && m<=59; }
function toHM(h,m){ if(h===24){h=23;m=59;} return pad(h)+':'+pad(m); }
function parseText(text){
  const out=[];
  text.split('\n').forEach(raw=>{
    if(RE_CONT.test(raw) && out.length){        // 续行：拼进上一条备注（换行保留）
      const prev=out[out.length-1];
      prev.note = ((prev.note?prev.note+'\n':'')+raw.trim()).slice(0,150);
      return;
    }
    const ln = raw.trim();
    if(!ln) return;
    let plan=false, body=ln;
    if(/^[。．.]\s*\d/.test(body)){ plan=true; body=body.replace(/^[。．.]\s*/,''); }
    let m;
    if(m = body.match(RE_RANGE)){
      const [,h1,m1,h2,m2,rest] = m;
      if(!validHM(+h1,+m1)||!validHM(+h2,+m2)) return junk(ln,out);
      const {cat,note} = splitRest(rest);
      const rec={id:uid(), start:toHM(+h1,+m1), end:toHM(+h2,+m2), cat, note};
      if(plan) rec.plan=true;
      out.push(rec);
    } else if(m = body.match(RE_SINGLE)){
      const [,h1,m1,rest] = m;
      if(!validHM(+h1,+m1)) return junk(ln,out);
      const {cat,note} = splitRest(rest);
      const rec={id:uid(), start:toHM(+h1,+m1), end:null, cat, note};
      if(plan) rec.plan=true;
      out.push(rec);
    } else junk(ln,out);
  });
  /* 起床记录保持时间点；其余"无结束时间"的记录只允许一条计时中（且仅限今天） */
  let openSeen=false;
  out.forEach(r=>{
    if(r.end==null && !isWakeCat(r.cat)){
      if(r.plan || openSeen || viewDate!==todayKey()) r.end=r.start;
      else openSeen=true;
    }
  });
  return out;
}
function isWakeCat(catId){ return catId==='wake' || catId==='gn'; }
function splitRest(rest){
  const t = (rest||'').trim();
  if(!t) return {cat:null, note:''};
  const sp = t.split(/\s+/);
  const c = catByName(sp[0]);
  if(c) return {cat:c.id, note:sp.slice(1).join(' ').slice(0,150)};
  return {cat:null, note:t.slice(0,150)};
}
function junk(ln,out){
  if(out.length){
    const prev=out[out.length-1];
    prev.note = ((prev.note?prev.note+' ':'')+ln).slice(0,150);
  }
}

function polar(cx,cy,r,deg){
  const rad=(deg-90)*Math.PI/180;
  return [cx+r*Math.cos(rad), cy+r*Math.sin(rad)];
}
function arcPath(cx,cy,r,a0,a1){
  if(a1-a0>=359.99){
    const [x0,y0]=polar(cx,cy,r,0),[x1,y1]=polar(cx,cy,r,180);
    return `M ${x0} ${y0} A ${r} ${r} 0 1 1 ${x1} ${y1} A ${r} ${r} 0 1 1 ${x0} ${y0}`;
  }
  const [x0,y0]=polar(cx,cy,r,a0),[x1,y1]=polar(cx,cy,r,a1);
  return `M ${x0} ${y0} A ${r} ${r} 0 ${a1-a0>180?1:0} 1 ${x1} ${y1}`;
}
function renderClock(){
  const mode=S.mode;
  const r0 = mode==='pm' ? 720 : 0;
  const r1 = mode==='am' ? 720 : 1440;
  const span = r1-r0;
  
  // ★ viewBox 扩大，给星标留出空间
  const VB_X = 10;
  const VB_Y = 5;
  const VB_W = 280;
  const VB_H = 290;
  
  // ★ 钟表中心位置（在 viewBox 中居中偏下，给上方星标留空间）
  const C = 150;       // 中心 X
  const CY = 155;      // 中心 Y（偏下，给上方星标留空间）
  const R = 100;       // 钟表半径
  const W = 30;        // 环宽
  
  let svg=`<svg viewBox="${VB_X} ${VB_Y} ${VB_W} ${VB_H}" width="290" height="300" role="img" aria-label="时间钟面">`;
  
  // ★ 背景圆圈
  svg+=`<path d="${arcPath(C,CY,R,0,360)}" stroke="var(--unrec)" stroke-width="${W}" fill="none"/>`;
  
  // ★ 收集所有记录和 idea
  const rs=dayRecs(viewDate);
  const ideas = rs.filter(r => r.idea);
  
  // ★ 绘制色块（睡眠 + 记录）
  const segsDraw=[];
  implicitSleepSegs(viewDate).forEach(([s,e],i)=>{
    segsDraw.push({id:'slp'+i, s, e, col:catById('sleep').color, op:0.5,
      tip:`睡眠 ${fmtClock(s)}–${fmtClock(e)} · ${fmtDur(e-s)}`});
  });
  rs.forEach(rec=>{
    const c = rec.cat ? catById(rec.cat) : null;
    recSegs(rec,viewDate).forEach(([s,e],i)=>{
      segsDraw.push({id:rec.id+'_'+i, s, e, col:c?c.color:'#C9C4B6', op:1,
        tip:`${c?c.name:'未分类'} ${fmtClock(s)}–${fmtClock(e)} · ${fmtDur(e-s)}`});
    });
  });
  segsDraw.forEach(g=>{
    const cs=Math.max(g.s,r0), ce=Math.min(g.e,r1);
    if(ce<=cs) return;
    const a0=(cs-r0)/span*360, a1=Math.max((ce-r0)/span*360, a0+0.9);
    if(clockSel===g.id)
      svg+=`<path d="${arcPath(C,CY,R,a0,a1)}" stroke="var(--ink)" stroke-width="${W+5}" fill="none"/>`;
    svg+=`<path class="cseg" data-id="${g.id}" data-tip="${escHtml(g.tip)}" d="${arcPath(C,CY,R,a0,a1)}" stroke="${g.col}" stroke-width="${W}" fill="none" opacity="${g.op}" style="cursor:pointer"/>`;
  });
  
  // ★ 起床红旗与晚安绿旗
  rs.filter(isMarker).forEach(w=>{
    const wake = w.cat==='wake';
    if(wake && mode==='pm') return;
    if(!wake && mode==='am') return;
    const m = hmToMin(w.start);
    if(m<r0 || m>r1) return;
    const a=(m-r0)/span*360;
    const col = wake ? '#C2543B' : '#1F7A5C';
    const [ax,ay]=polar(C,CY,R-W/2-2,a);
    const [bx,by]=polar(C,CY,R+W/2+12,a);
    const [px2,py2]=polar(C,CY,R+W/2+8.5,a+13);
    const [qx,qy]=polar(C,CY,R+W/2+5,a);
    svg+=`<g class="cflag" data-id="fl_${w.id}" data-tip="${wake?'起床':'入睡'} ${w.start}" style="cursor:pointer">`
       + `<line x1="${ax}" y1="${ay}" x2="${bx}" y2="${by}" stroke="${col}" stroke-width="1.8"/>`
       + `<polygon points="${bx},${by} ${px2},${py2} ${qx},${qy}" fill="${col}"/></g>`;
  });
  
  // ★★★ 绘制 idea 星标（使用不同长度虚线避免遮挡） ★★★
  if(showIdeaOnClock && ideas.length){
    const outerRadius = R + W/2 + 1;  // 钟表外圈
    
    // 计算每个星标的角度
    const starItems = ideas.map(r => {
      const m = hmToMin(r.start);
      if(m < r0 || m > r1) return null;
      return {
        rec: r,
        angle: (m - r0) / span * 360,
        minute: m
      };
    }).filter(s => s !== null);
    
    if(starItems.length){
      // 按角度排序
      starItems.sort((a,b) => a.angle - b.angle);
      
      // ★ 防遮挡：为每个星标分配不同的半径（虚线长度不同）
      // 基础半径 = 钟表外圈 + 偏移量
      const baseRadius = outerRadius + 12;
      const maxRadius = outerRadius + 65;
      const MIN_ANGLE_DIFF = 13;  // 最小角度差
      const RADIUS_STEP = 9;       // 半径步进
      
      // 先检查冲突，分配半径
      starItems.forEach((item, idx) => {
        let radius = baseRadius;
        
        // 检查前面几个星标
        for(let j = Math.max(0, idx - 5); j < idx; j++) {
          const prev = starItems[j];
          let diff = item.angle - prev.angle;
          if(diff < 0) diff += 360;
          if(diff < MIN_ANGLE_DIFF) {
            const overlap = (MIN_ANGLE_DIFF - diff) / MIN_ANGLE_DIFF;
            radius = baseRadius + Math.ceil(overlap * RADIUS_STEP * (idx - j + 1));
          }
        }
        
        item.radius = Math.min(radius, maxRadius);
        item.adjustedAngle = item.angle;
        
        // 如果仍然太近，微调角度
        for(let j = Math.max(0, idx - 3); j < idx; j++) {
          const prev = starItems[j];
          let diff = item.adjustedAngle - prev.adjustedAngle;
          if(diff < 0) diff += 360;
          if(diff < 8) {
            item.adjustedAngle = item.angle + (idx % 2 === 0 ? 4 : -4);
            break;
          }
        }
      });
      
      // ★ 绘制星标
      starItems.forEach((item) => {
        const r = item.rec;
        const angle = item.adjustedAngle || item.angle;
        const radius = item.radius || baseRadius;
        
        // 星标位置
        const [sx, sy] = polar(C, CY, radius, angle);
        
        // 虚线起点（钟表外圈）
        const [startX, startY] = polar(C, CY, outerRadius, angle);
        
        // 星标信息
        const tip = (r.note||'').slice(0,15) + ((r.note||'').length>15?'…':'');
        const timeStr = r.start;
        
        // ★★ 半透明白色虚线（不同长度由 radius 决定） ★★
        svg += `<line x1="${startX}" y1="${startY}" x2="${sx}" y2="${sy}" 
                    stroke="rgba(255,255,255,0.45)" stroke-width="1.5" stroke-dasharray="3 4"/>`;
        
        // ★★ 钟表边缘小圆点 ★★
        svg += `<circle cx="${startX}" cy="${startY}" r="2.5" fill="#E0A400" opacity="0.6"/>`;
        
        // ★★ 星标 ★★
        svg += `<text class="idea-star" x="${sx}" y="${sy+5}" text-anchor="middle" 
                      font-size="16" fill="#E0A400" 
                      style="cursor:pointer;filter:drop-shadow(0 1px 3px rgba(0,0,0,0.35))" 
                      data-tip="${escHtml(timeStr + ' · ' + tip)}">⭐</text>`;
      });
    }
  }
  
  // ★ 时针刻度
  const hours = span/60;
  for(let i=0;i<hours;i++){
    const a=i/hours*360;
    const major = (mode==='all') ? i%3===0 : true;
    const [x0,y0]=polar(C,CY,R+W/2+2,a);
    const [x1,y1]=polar(C,CY,R+W/2+(major?8:4),a);
    svg+=`<line x1="${x0}" y1="${y0}" x2="${x1}" y2="${y1}" stroke="var(--ink-2)" stroke-width="${major?1.4:0.7}" opacity=".6"/>`;
  }
  
  // ★ 数字标签
  const numHours = mode==='all' ? [0,3,6,9,12,15,18,21] : [0,3,6,9];
  numHours.forEach(n=>{
    const a=n/hours*360;
    const label = mode==='pm' ? n+12 : n;
    const [x,y]=polar(C,CY,R+W/2+18,a);
    svg+=`<text x="${x}" y="${y+4}" text-anchor="middle" font-size="11" fill="var(--ink-2)" font-weight="500">${label}</text>`;
  });
  
  // ★ 当前时间指针
  if(viewDate===todayKey()){
    const nm=nowMin();
    if(nm>=r0 && nm<=r1){
      const a=(nm-r0)/span*360;
      const [ix,iy]=polar(C,CY,30,a);
      const [hx,hy]=polar(C,CY,R+W/2+2,a);
      svg+=`<line x1="${ix}" y1="${iy}" x2="${hx}" y2="${hy}" stroke="var(--ink)" stroke-width="2.5" opacity=".8" stroke-linecap="round"/>`;
      svg+=`<circle cx="${hx}" cy="${hy}" r="3" fill="var(--ink)"/>`;
    }
  }
  
  // ★ 中心统计文字
  let tot=0; 
  rs.forEach(r=>recSegs(r,viewDate).forEach(([s,e])=>{
    const v=Math.min(e,r1)-Math.max(s,r0); if(v>0) tot+=v;
  }));
  implicitSleepSegs(viewDate).forEach(([s,e])=>{
    const v=Math.min(e,r1)-Math.max(s,r0); if(v>0) tot+=v;
  });
  svg+=`<text x="${C}" y="${CY-4}" text-anchor="middle" font-size="20" fill="var(--ink)" font-weight="700">${fmtDur(tot)}</text>`;
  svg+=`<text x="${C}" y="${CY+18}" text-anchor="middle" font-size="11" fill="var(--ink-2)">已记录 · ${mode.toUpperCase()}</text>`;
  
  // ★ 星标开关（左上角）
  const hasStars = ideas.length > 0;
  const toggleColor = showIdeaOnClock && hasStars ? 'var(--blue)' : 'var(--line)';
  const toggleText = showIdeaOnClock && hasStars ? '#fff' : 'var(--ink-2)';
  
  svg += `<rect x="${VB_X+6}" y="${VB_Y+6}" width="38" height="24" rx="12" fill="${toggleColor}" 
              style="cursor:pointer" id="ideaClockToggle"/>`;
  svg += `<text x="${VB_X+16}" y="${VB_Y+22}" font-size="11" fill="${toggleText}" 
              style="cursor:pointer;font-weight:600" id="ideaClockToggleLabel">⭐</text>`;
  
  // ★ 星标数量提示
  if(hasStars && showIdeaOnClock){
    svg += `<text x="${VB_X + 50}" y="${VB_Y + 22}" font-size="9" fill="var(--ink-2)" opacity="0.7">${ideas.length}</text>`;
  }
  
  svg += `</svg>`;
  $('clockWrap').innerHTML = svg;
  
  // ★ 星标点击事件
  $('clockWrap').querySelectorAll('.idea-star').forEach(el => {
    el.onclick = (e)=>{
      e.stopPropagation();
      toast('💡 ' + el.dataset.tip);
    };
  });
  
  // ★ 开关点击事件
  const toggle = document.getElementById('ideaClockToggle');
  if(toggle){
    toggle.onclick = ()=>{
      showIdeaOnClock = !showIdeaOnClock;
      renderClock();
    };
  }
  const toggleLabel = document.getElementById('ideaClockToggleLabel');
  if(toggleLabel){
    toggleLabel.onclick = ()=>{
      showIdeaOnClock = !showIdeaOnClock;
      renderClock();
    };
  }
  
  // ★ 钟面色块点击
  $('clockWrap').querySelectorAll('.cseg,.cflag').forEach(el=>{
    el.addEventListener('click',()=>{
      const id=el.dataset.id;
      if(clockSel===id){ clockSel=null; $('clockTip').textContent=''; }
      else { clockSel=id; $('clockTip').textContent=el.dataset.tip; }
      renderClock();
    });
  });
  if(clockSel){
    const cur=$('clockWrap').querySelector(`[data-id="${clockSel}"]`);
    if(cur) $('clockTip').textContent=cur.dataset.tip;
    else { clockSel=null; $('clockTip').textContent=''; }
  }
}
function renderBars(){
  const rs=dayRecs(viewDate);
  const mins={}, notes={};
  let untagged=0, total=0;
  rs.forEach(r=>{
    if(r.note && r.note.trim()){
      const key=r.cat||'_none';
      (notes[key]=notes[key]||[]).push({t:r.start, txt:r.note});
    }
    if(isMarker(r) || r.plan || r.idea) return;
    const d=recDur(r,viewDate); total+=d;
    if(r.cat) mins[r.cat]=(mins[r.cat]||0)+d; else untagged+=d;
  });
  let imp=0; implicitSleepSegs(viewDate).forEach(([s,e])=>imp+=e-s);
  if(imp){ mins['sleep']=(mins['sleep']||0)+imp; total+=imp; }
  const rows=[];
  S.cats.forEach(c=>{ if(mins[c.id]) rows.push({id:c.id,name:c.name,color:c.color,v:mins[c.id]}); });
  if(untagged) rows.push({id:'_none',name:'未分类',color:'#C9C4B6',v:untagged});
  rows.sort((a,b)=>b.v-a.v);
  rows.push({name:'未记录',color:'var(--unrec)',v:Math.max(0,1440-total),unrec:true});
  $('barWrap').innerHTML = rows.map(r=>{
    const pct=r.v/1440*100;
    let html=`<div class="bar">
      <span class="name"><span class="dot" style="background:${r.color};${r.unrec?'border:1px solid var(--line)':''}"></span>${r.name}</span>
      <div class="track"><div class="fill" style="width:${pct}%;background:${r.color}"></div></div>
      <span class="val">${fmtDur(r.v)} · ${Math.round(pct)}%</span>

function monthDays(ym){
  const [y,m]=ym.split('-').map(Number);
  return new Date(y,m,0).getDate();
}
function shiftMonth(ym,n){
  const [y,m]=ym.split('-').map(Number);
  const d=new Date(y,m-1+n,1);
  return d.getFullYear()+'-'+pad(d.getMonth()+1);
}
function mondayOf(k){
  const d=keyToDate(k);
  return shiftDay(k, -((d.getDay()+6)%7));
}
function monthCatMinutes(ym){
  const days=monthDays(ym), mins={};
  for(let d=1;d<=days;d++){
    const k=ym+'-'+pad(d);
    (S.recs[k]||[]).forEach(r=>{
      if(isMarker(r)) return;
      let v=0; recSegs(r,k).forEach(([s,e])=>v+=e-s);
      const key=r.cat||'_none';
      mins[key]=(mins[key]||0)+v;
    });
    implicitSleepSegs(k).forEach(([s,e])=>{ mins['sleep']=(mins['sleep']||0)+(e-s); });
  }
  return mins;
}

function renderWeekChart(tagId){
  const sheet = $('calSheet');
  const days = [...Array(7)].map((_,i)=>shiftDay(calWeekStart,i));
  
  // 获取该标签本周每日数据
  const daily = [];
  let maxV = 0;
  days.forEach((k, idx)=>{
    let v = 0;
    (S.recs[k]||[]).forEach(r=>{
      const match = tagId === '_none' ? r.cat==null : r.cat === tagId;
      if(!match || isMarker(r)) return;
      recSegs(r,k).forEach(([s,e])=>v+=e-s);
    });
    if(tagId === 'sleep'){
      implicitSleepSegs(k).forEach(([s,e])=>v+=e-s);
    }
    daily.push(v);
    if(v > maxV) maxV = v;
  });
  
  const c = tagId === '_none' ? {name:'未分类', color:'#C9C4B6'} : catById(tagId);
  if(!c){ toast('标签不存在'); return; }
  
  // ★ 计算平均时长
  const total = daily.reduce((a,b)=>a+b, 0);

  // 返回按钮

      <button class="close" id="weekChartClose">✕</button>

  const W=360, H=150, P=32;

  let svg = `<svg viewBox="0 0 ${W} ${H}" width="100%">`;

    svg += `<text x="${P-4}" y="${y+3}" text-anchor="end" font-size="9" fill="var(--ink-2)">${fmtDur(label)}</text>`;

    const bh = (H - 22) - py(v);
    const barHeight = Math.max(bh, 1);
    
    svg += `<rect x="${x}" y="${py(v)}" width="${bw-4}" height="${barHeight}" 
                fill="${c.color}" rx="2" opacity="${v>0?0.85:0.2}"/>`;
    
    // ★ 柱子上方显示该标签的使用时间
    const timeLabel = v > 0 ? fmtDur(v) : '0min';
    svg += `<text x="${x + bw/2}" y="${Math.max(py(v) - 5, 34)}" text-anchor="middle" font-size="9" 
                  fill="${c.color}" font-weight="500">${timeLabel}</text>`;
    
    // 柱子下方显示日期
    const dd = keyToDate(days[i]);
    const label = (dd.getMonth()+1) + '/' + dd.getDate();
    svg += `<text x="${x + bw/2}" y="${H-6}" text-anchor="middle" font-size="9" fill="var(--ink-2)">${label}</text>`;
  });
  
  // ★ 合计值 - 带背景框
  svg += `<rect x="${W-P-110}" y="6" width="106" height="24" rx="6" fill="${c.color}" opacity="0.1"/>`;
  svg += `<text x="${W-P-4}" y="23" text-anchor="end" font-size="12" fill="${c.color}" font-weight="700">合计 ${fmtDur(total)}</text>`;
  
  // ★ 平均时长
  if(avg > 0){
  }
  
  svg += `</svg>`;
  
  // ★ 每日明细（在图表下方显示每日数据）
  let detailHtml = `<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:8px;font-size:11px;color:var(--ink-2);justify-content:center">`;
  days.forEach((k, i)=>{
    const dd = keyToDate(k);
    const v = daily[i];
    detailHtml += `<span style="background:var(--card);padding:2px 10px;border-radius:4px;border:1px solid var(--line)">
      ${dd.getMonth()+1}/${dd.getDate()} ${v > 0 ? fmtDur(v) : '0min'}
    </span>`;
  });
  detailHtml += `</div>`;
  
  // ★ 日均显示在图表下方
  let avgHtml = '';
  if(avg > 0){
    avgHtml = `<div style="text-align:center;margin-top:4px;font-size:12px;color:var(--ink-2)">
      本周日均 <span style="font-weight:600;color:${c.color}">${fmtDur(avg)}</span>

  sheet.innerHTML = backHtml + `
    <div class="calchart">

  // ★ 修复返回按钮事件

  if(backBtn) backBtn.onclick = function(e){ e.stopPropagation(); renderCal(); };
  const closeBtn = document.getElementById('weekChartClose');
  if(closeBtn) closeBtn.onclick = function(e){ e.stopPropagation(); closeCal(); };
}
function weekGrid(days){
  const H=24*weekZoom;
  const cols=days.map(k=>{
    /* 收集当天所有块 */
    const items=[];
    implicitSleepSegs(k).forEach(([s,e])=>items.push({s,e,type:'sleep'}));
    (S.recs[k]||[]).forEach(r=>{
      if(isMarker(r)) return;
      const segs = r.plan ? rawSegs(r,k) : recSegs(r,k);
      segs.forEach(([s,e])=>items.push({s,e,type:r.plan?'plan':'rec',r}));
    });
    items.sort((a,b)=>a.s-b.s || b.e-a.e);
    /* 重叠簇内分车道，纵向劈开 */
    let i=0;
    while(i<items.length){
      let j=i, maxE=items[i].e;
      const laneEnd=[];
      while(j<items.length && (j===i || items[j].s<maxE)){
        const it=items[j];
        let lane=laneEnd.findIndex(le=>le<=it.s);
        if(lane===-1){ lane=laneEnd.length; laneEnd.push(0); }
        laneEnd[lane]=it.e;
        it.lane=lane;
        maxE=Math.max(maxE,it.e);
        j++;
      }
      for(let x=i;x<j;x++) items[x].lanes=laneEnd.length;
      i=j;
    }
    const blocks=items.map(it=>{
      const c = it.type==='sleep' ? catById('sleep') : (it.r && it.r.cat ? catById(it.r.cat) : null);
      if(it.type==='plan') return wkPlanBlock(it.s,it.e,c,k,it.r,it.lane,it.lanes);
      return wkBlock(it.s,it.e,c,k, it.type==='sleep'?'睡眠':null, it.type==='sleep', it.r?it.r.note:'', it.lane, it.lanes);
    }).join('');
    let stars='';
    (S.recs[k]||[]).forEach(r=>{
      if(!r.idea) return;
      const dd=keyToDate(k);
      const tip=`💡 ${dd.getMonth()+1}月${dd.getDate()}日 ${r.start} · ${(r.note||'').slice(0,30)}`;
      stars+=`<div class="wkstar" style="top:${hmToMin(r.start)/1440*100}%" data-tip="${escHtml(tip)}">★</div>`;
    });
    return `<div class="wkcol">${blocks}${stars}</div>`;
  }).join('');
  const step = weekZoom>=26 ? 60 : 120;
  let hours='';
  for(let m2=0;m2<1440;m2+=step){
    hours+=`<div class="wkhr" style="top:${m2/1440*100}%"><span>${pad(m2/60)}:00</span></div>`;
  }
  const gpx=step*weekZoom/60;
  return `<div class="weekgrid" style="height:${H}px;background-image:repeating-linear-gradient(to bottom, transparent, transparent ${gpx-1}px, var(--line) ${gpx-1}px, var(--line) ${gpx}px)"><div class="wkhours">${hours}</div>${cols}</div>`;
}
function wkGeom(lane,lanes){
  const w=100/(lanes||1), l=(lane||0)*w;
  return `left:calc(${l}% + 1px);width:calc(${w}% - 2px)`;
}
function wkBlock(s,e,c,k,label,implicit,note,lane,lanes){
  const top=s/1440*100, hh=(e-s)/1440*100;
  const col=c?c.color:'#C9C4B6';
  const name=label||(c?c.name:'未分类');
  const tall=(e-s)*weekZoom/60;
  const dd=keyToDate(k);
  const tip=`${dd.getMonth()+1}月${dd.getDate()}日 ${fmtClock(s)}–${fmtClock(e)} ${name} · ${fmtDur(e-s)}`;
  let inner='';
  if(tall>=13) inner+=escHtml(name);

}
function wkPlanBlock(s,e,c,k,r,lane,lanes){

}
function weekTotals(days){
  const mins={};
  days.forEach(k=>{
    (S.recs[k]||[]).forEach(r=>{
      if(isMarker(r)) return;
      let v=0; recSegs(r,k).forEach(([s,e])=>v+=e-s);
      const key=r.cat||'_none';
      mins[key]=(mins[key]||0)+v;
    });
    implicitSleepSegs(k).forEach(([s,e])=>{ mins['sleep']=(mins['sleep']||0)+(e-s); });
  });
  const rows=[];
  S.cats.forEach(c=>{ if(mins[c.id]) rows.push({id:c.id, name:c.name, color:c.color, v:mins[c.id]}); });
  if(mins['_none']) rows.push({id:'_none', name:'未分类', color:'#C9C4B6', v:mins['_none']});
  rows.sort((a,b)=>b.v-a.v);
  if(!rows.length) return `<div class="caltotals"><h4>本周累计时长</h4><div style="font-size:12.5px;color:var(--ink-2);padding:4px">本周还没有记录</div></div>`;
  const total=7*1440, maxV=rows[0].v;
  
  return `<div class="caltotals"><h4>本周累计时长（点标签看趋势图）</h4>`+rows.map(r=>{
    // ★ 睡眠标签不展开，其他可点击
    const isSleep = r.id === 'sleep';
    return `<div class="trow" ${isSleep ? '' : `data-tag="${r.id}" data-week="true"`} style="${isSleep ? 'cursor:default' : ''}">
      <span class="name"><span class="dot" style="background:${r.color}"></span>${r.name}</span>
      <div class="track"><div class="fill" style="width:${r.v/maxV*100}%;background:${r.color}"></div></div>
      <span class="val">${fmtDur(r.v)} · ${Math.round(r.v/total*100)}%</span>
      ${isSleep ? '' : '<span class="arrow">›</span>'}
    </div>`;
  }).join('')+`</div>`;
}
function weekMarkerChart(days,catId){
  const color = catId==='wake' ? '#C2543B' : '#1F7A5C';
  const pts=[];
  days.forEach((k,i)=>{
    const m2 = catId==='wake' ? wakeValOf(k) : gnValOf(k);
    if(m2==null) return;
    pts.push({i,m:m2,k});
  });
  if(!pts.length) return `<div class="chartbox" style="text-align:center;color:var(--ink-2);font-size:12.5px;padding:14px 0">本周还没有${catId==='wake'?'起床':'晚安'}打点</div>`;
  const tipId='wmk_'+catId;
  const W=340,H=118,P=36;
  let lo=Math.min(...pts.map(p=>p.m)), hi=Math.max(...pts.map(p=>p.m));
  lo=Math.floor(lo/60)*60-30; hi=Math.ceil(hi/60)*60+30;
  if(hi-lo<120){ lo-=30; hi+=30; }
  const px=i=> P + i/6*(W-P-14);
  const py=m2=> H-20 - (m2-lo)/(hi-lo)*(H-38);
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%">`;
  const step=Math.max(60, Math.ceil((hi-lo)/240)*60);
  for(let g=Math.ceil(lo/60)*60; g<=hi; g+=step){
    svg+=`<line x1="${P}" y1="${py(g)}" x2="${W-10}" y2="${py(g)}" stroke="var(--line)" stroke-width="1"/>`;
    svg+=`<text x="${P-4}" y="${py(g)+3}" text-anchor="end" font-size="9.5" fill="var(--ink-2)">${fmtClock(g)}</text>`;
  }
  svg+=`<polyline points="${pts.map(p=>px(p.i)+','+py(p.m)).join(' ')}" fill="none" stroke="${color}" stroke-width="2"/>`;
  const avg=pts.reduce((a,p)=>a+p.m,0)/pts.length;
  svg+=`<line x1="${P}" y1="${py(avg)}" x2="${W-10}" y2="${py(avg)}" stroke="${color}" stroke-width="1.3" stroke-dasharray="5 4" opacity=".75"/>`;
  svg+=`<text x="${W-12}" y="${py(avg)-4}" text-anchor="end" font-size="9.5" fill="${color}">平均 ${fmtClock(avg)}</text>`;
  pts.forEach(p=>{
    const dd=keyToDate(p.k);
    svg+=`<circle class="mkdot" cx="${px(p.i)}" cy="${py(p.m)}" r="5.5" fill="${color}" data-t="${tipId}" data-label="${dd.getMonth()+1}月${dd.getDate()}日 · ${fmtClock(p.m)}" style="cursor:pointer"/>`;
  });
  ['一','二','三','四','五','六','日'].forEach((w,i)=>
    svg+=`<text x="${px(i)}" y="${H-5}" text-anchor="middle" font-size="10" fill="var(--ink-2)">${w}</text>`);
  svg+=`</svg>`;
  const last=pts[pts.length-1], ld=keyToDate(last.k);
  return `<div class="tipline" id="${tipId}">${ld.getMonth()+1}月${ld.getDate()}日 · ${fmtClock(last.m)}</div><div class="chartbox">${svg}</div>`;
}

/* 本月起床/入睡时间折线图 */
function fmtClock(m){ const mm=((Math.round(m)%1440)+1440)%1440; return pad(Math.floor(mm/60))+':'+pad(mm%60); }
function markerCharts(){
  return `<div class="caltotals"><h4>本月起床时间（点圆点看数值）</h4>${markerChart('wake')}</div>`
       + `<div class="caltotals"><h4>本月入睡时间（点圆点看数值）</h4>${markerChart('gn')}</div>`
       + `<div class="caltotals"><h4>本月累计睡眠时长（入睡→次日起床，点柱子看数值）</h4>${sleepChartMonth()}</div>`;
}
function sleepChartMonth(){
  const days=monthDays(calMonth);
  const mo=+calMonth.split('-')[1];
  const pts=[];
  for(let d=1;d<=days;d++){
    const v=sleepDurOf(calMonth+'-'+pad(d));
    if(v!=null) pts.push({x:d-1, full:`${mo}月${d}日`, v});
  }
  const xl=[1,Math.round(days/2),days].map(d=>({i:d-1,t:d+'日'}));
  
  // ★ 计算平均睡眠时长（仅统计有记录的天数）
  const validPts = pts.filter(p => p.v > 0);
  const totalSleep = pts.reduce((sum, p) => sum + p.v, 0);
  const avgSleep = validPts.length > 0 ? Math.round(totalSleep / validPts.length) : 0;
  
  // 使用 durBars 时传入 avg 参数
  return durBars(pts, days, 'slpM', xl, avgSleep);
}
function sleepChartWeek(days){
  const WD=['一','二','三','四','五','六','日'];
  const pts=[];
  days.forEach((k,i)=>{
    const v=sleepDurOf(k);
    if(v!=null){ const dd=keyToDate(k); pts.push({x:i, full:`${dd.getMonth()+1}月${dd.getDate()}日`, v}); }
  });
  
  // ★ 计算平均睡眠时长
  const validPts = pts.filter(p => p.v > 0);
  const avg = validPts.length > 0 ? Math.round(pts.reduce((s,p)=>s+p.v,0) / validPts.length) : 0;
  
  return durBars(pts, 7, 'slpW', WD.map((t,i)=>({i,t})), avg);
}
function durBars(pts, n, tipId, xlabels, avgValue){
  if(!pts.length) return `<div class="chartbox" style="text-align:center;color:var(--ink-2);font-size:12.5px;padding:14px 0">还没有可配对的入睡与起床打点</div>`;
  const col=catById('sleep').color;
  const W=340,H=140,P=36;
  const maxV=Math.max(...pts.map(p=>p.v), 360);
  const step=Math.ceil(maxV/4/60)*60;
  const topV=step*4;
  const bw=(W-P-10)/n;
  const py=v=>H-24 - v/topV*(H-48);
  
  // ★ 计算有效天数和平均值
  const validPts = pts.filter(p => p.v > 0);
  const avg = avgValue !== undefined ? avgValue : (validPts.length > 0 ? Math.round(pts.reduce((s,p)=>s+p.v,0) / validPts.length) : 0);
  
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%">`;
  
  // 网格线
  for(let g=step; g<=topV; g+=step){
    svg+=`<line x1="${P}" y1="${py(g)}" x2="${W-8}" y2="${py(g)}" stroke="var(--line)" stroke-width="1"/>`;
    svg+=`<text x="${P-4}" y="${py(g)+3}" text-anchor="end" font-size="9.5" fill="var(--ink-2)">${fmtDur(g)}</text>`;
  }
  svg+=`<line x1="${P}" y1="${H-24}" x2="${W-8}" y2="${H-24}" stroke="var(--line)" stroke-width="1"/>`;
  
  // ★ 绘制柱子（不在上方显示时间）
  pts.forEach(p=>{
    const bh=(H-24)-py(p.v);
    svg+=`<rect class="mkdot" x="${P+p.x*bw+2}" y="${py(p.v)}" width="${Math.max(bw-4,3)}" height="${Math.max(bh, 1)}" rx="2.5" fill="${col}" fill-opacity=".85" data-t="${tipId}" data-label="${p.full} · ${fmtDur(p.v)}" style="cursor:pointer"/>`;
  });
  
  // ★★ 绘制平均线（如果有平均值且 > 0）
  if(avg > 0){
    const avgY = py(avg);
    svg+=`<line x1="${P}" y1="${avgY}" x2="${W-8}" y2="${avgY}" stroke="${col}" stroke-width="1.5" stroke-dasharray="6 4" opacity="0.7"/>`;
    svg+=`<text x="${W-12}" y="${avgY-4}" text-anchor="end" font-size="9.5" fill="${col}" opacity="0.85">平均 ${fmtDur(avg)}</text>`;
  }
  
  // X轴标签
  xlabels.forEach(l=>svg+=`<text x="${P+l.i*bw+bw/2}" y="${H-6}" text-anchor="middle" font-size="10" fill="var(--ink-2)">${l.t}</text>`);
  svg+=`</svg>`;
  
  // ★ 底部显示统计信息
  const last=pts[pts.length-1];
  let infoHtml = '';
  if(avg > 0){
    const daysWithData = validPts.length;
    infoHtml = `<div style="text-align:center;margin-top:2px;font-size:11px;color:var(--ink-2)">
      有数据 ${daysWithData} 天 · 日均 <span style="font-weight:600;color:${col}">${fmtDur(avg)}</span>
      ${pts.length > 0 ? `· 总 <span style="font-weight:600;color:${col}">${fmtDur(pts.reduce((s,p)=>s+p.v,0))}</span>` : ''}
    </div>`;
  }
  
  return `<div class="tipline" id="${tipId}">${last.full} · ${fmtDur(last.v)}</div><div class="chartbox">${svg}</div>${infoHtml}`;
}
function markerChart(catId){
  const days=monthDays(calMonth);
  const color = catId==='wake' ? '#C2543B' : '#1F7A5C';
  const pts=[];
  for(let d=1;d<=days;d++){
    const k=calMonth+'-'+pad(d);
    const m = catId==='wake' ? wakeValOf(k) : gnValOf(k);
    if(m==null) continue;
    pts.push({d,m});
  }
  if(!pts.length){
    return `<div class="chartbox" style="text-align:center;color:var(--ink-2);font-size:12.5px;padding:16px 0">本月还没有${catId==='wake'?'起床':'晚安'}打点</div>`;
  }
  const tipId='mkTip_'+catId;
  const W=340,H=132,P=36;
  let lo=Math.min(...pts.map(p=>p.m)), hi=Math.max(...pts.map(p=>p.m));
  lo=Math.floor(lo/60)*60-30; hi=Math.ceil(hi/60)*60+30;
  if(hi-lo<120){ lo-=30; hi+=30; }
  const px=d=> P + (days>1 ? (d-1)/(days-1)*(W-P-14) : 0);
  const py=m=> H-20 - (m-lo)/(hi-lo)*(H-38);
  let svg=`<svg viewBox="0 0 ${W} ${H}" width="100%">`;
  const step=Math.max(60, Math.ceil((hi-lo)/240)*60);   // 网格线：整点
  for(let g=Math.ceil(lo/60)*60; g<=hi; g+=step){
    svg+=`<line x1="${P}" y1="${py(g)}" x2="${W-10}" y2="${py(g)}" stroke="var(--line)" stroke-width="1"/>`;
    svg+=`<text x="${P-4}" y="${py(g)+3}" text-anchor="end" font-size="9.5" fill="var(--ink-2)">${fmtClock(g)}</text>`;
  }
  svg+=`<polyline points="${pts.map(p=>px(p.d)+','+py(p.m)).join(' ')}" fill="none" stroke="${color}" stroke-width="2"/>`;
  const avg=pts.reduce((a,p)=>a+p.m,0)/pts.length;
  svg+=`<line x1="${P}" y1="${py(avg)}" x2="${W-10}" y2="${py(avg)}" stroke="${color}" stroke-width="1.3" stroke-dasharray="5 4" opacity=".75"/>`;
  svg+=`<text x="${W-12}" y="${py(avg)-4}" text-anchor="end" font-size="9.5" fill="${color}">平均 ${fmtClock(avg)}</text>`;
  pts.forEach(p=>{
    svg+=`<circle class="mkdot" cx="${px(p.d)}" cy="${py(p.m)}" r="5.5" fill="${color}" data-t="${tipId}" data-label="${p.d}日 · ${fmtClock(p.m)}" style="cursor:pointer"/>`;
  });
  [1,Math.round(days/2),days].forEach(d=>
    svg+=`<text x="${px(d)}" y="${H-5}" text-anchor="middle" font-size="10" fill="var(--ink-2)">${d}日</text>`);
  svg+=`</svg>`;
  const last=pts[pts.length-1];
  return `<div class="tipline" id="${tipId}">${last.d}日 · ${fmtClock(last.m)}</div><div class="chartbox">${svg}</div>`;
}

function miniClock(k, rs){
  const C=13,R=9,W=5;
  let s=`<svg viewBox="0 0 26 26" width="24" height="24">`;
  s+=`<circle cx="${C}" cy="${C}" r="${R}" stroke="var(--unrec)" stroke-width="${W}" fill="none"/>`;
  implicitSleepSegs(k).forEach(([a,b])=>{
    const a0=a/1440*360, a1=b/1440*360;
    s+=`<path d="${arcPath(C,C,R,a0,Math.max(a1,a0+2))}" stroke="${catById('sleep').color}" stroke-width="${W}" fill="none" opacity=".55"/>`;
  });
  rs.forEach(rec=>{
    const col = rec.cat ? (catById(rec.cat)?.color||'#C9C4B6') : '#C9C4B6';
    recSegs(rec,k).forEach(([a,b])=>{
      const a0=a/1440*360, a1=b/1440*360;
      s+=`<path d="${arcPath(C,C,R,a0,Math.max(a1,a0+2))}" stroke="${col}" stroke-width="${W}" fill="none"/>`;
    });
  });
  return s+`</svg>`;
}

function renderCalChart(){
  const sheet=$('calSheet');
  const [y,m]=calMonth.split('-').map(Number);
  const c = calTag==='_none' ? {name:'未分类',color:'#C9C4B6'} : catById(calTag);
  if(!c){ calTag=null; renderCal(); return; }
  const days=monthDays(calMonth);
  const daily=[], hourly=new Array(24).fill(0);
  for(let d=1;d<=days;d++){
    const k=calMonth+'-'+pad(d);
    let v=0;
    (S.recs[k]||[]).forEach(r=>{
      const match = calTag==='_none' ? r.cat==null : r.cat===calTag;
      if(!match || isMarker(r)) return;
      recSegs(r,k).forEach(([s,e])=>{
        v+=e-s;
        for(let h=Math.floor(s/60); h<Math.ceil(e/60); h++){
          hourly[h]+=Math.min(e,(h+1)*60)-Math.max(s,h*60);
        }
      });
    });
    daily.push(v);
  }
  const maxD=Math.max(...daily,30), maxH=Math.max(...hourly,30);
  const maxIdx=daily.indexOf(Math.max(...daily));
  const maxHIdx=hourly.indexOf(Math.max(...hourly));
  
  // ★ 计算月平均时长（仅统计有记录的日期）
  const daysWithRecord = daily.filter(v => v > 0);
  const total = daily.reduce((a,b)=>a+b, 0);
  const avg = daysWithRecord.length > 0 ? Math.round(total / daysWithRecord.length) : 0;
  
  /* 折线图 */
  const W1=340,H1=140,P=26;
  const px=i=>P+i/(days-1)*(W1-2*P), py=v=>H1-22-v/maxD*(H1-44);
  let pts=daily.map((v,i)=>`${px(i)},${py(v)}`).join(' ');
  let line=`<svg viewBox="0 0 ${W1} ${H1}" width="100%" id="lineSvg">
    <line x1="${P}" y1="${H1-22}" x2="${W1-P+8}" y2="${H1-22}" stroke="var(--line)" stroke-width="1"/>

  daily.forEach((v,i)=>{
    line+=`<circle cx="${px(i)}" cy="${py(v)}" r="5.5" fill="${c.color}" fill-opacity="${v?1:.25}" data-d="${i+1}" data-v="${v}" style="cursor:pointer"/>`;

  // ★ 在折线图上添加平均线

    line+=`<text x="${W1-P+4}" y="${avgY+3}" text-anchor="start" font-size="9" fill="${c.color}" opacity="0.7">平均 ${fmtDur(avg)}</text>`;
  }
  line+=`</svg>`;
  
  /* 时段柱状图 */

  let bars=`<svg viewBox="0 0 ${W2} ${H2}" width="100%" id="barSvg">

    bars+=`<rect class="hit" x="${P2+h*bw}" y="0" width="${bw}" height="${H2-22}" fill="transparent" data-h="${h}" data-v="${v}" style="cursor:pointer"/>`;
  });
  [0,6,12,18,24].forEach(h=>{
    bars+=`<text x="${P2+h*bw}" y="${H2-6}" text-anchor="middle" font-size="10" fill="var(--ink-2)">${h}</text>`;
  });
  bars+=`</svg>`;
  
  // ★ 显示平均时长信息
  let avgHtml = '';
  if(avg > 0){
    avgHtml = `<div style="text-align:center;margin-top:2px;font-size:12px;color:var(--ink-2)">
      有记录 ${daysWithRecord.length} 天 · 日均 <span style="font-weight:600;color:${c.color}">${fmtDur(avg)}</span>
      ${total > 0 ? `· 月累计 <span style="font-weight:600;color:${c.color}">${fmtDur(total)}</span>` : ''}
    </div>`;
  }
  
  sheet.innerHTML=`
    <div class="calhead">
      <button class="back" id="chBack">‹ 返回</button>
      <div class="mtitle" style="flex:1;text-align:center">${c.name} · ${y}年${m}月</div>
      <button class="close" id="chClose">✕</button>
    </div>
    <div class="calchart">
      <h4>每天的时长（点圆点看具体数值）</h4>
      <div class="tipline" id="chTip">${m}月${maxIdx+1}日 · ${fmtDur(daily[maxIdx])}</div>
      <div class="chartbox">${line}</div>
      ${avgHtml}
      <h4 style="margin-top:12px">累计时长的时段分布（0–24 时，点柱子看数值）</h4>
      <div class="tipline" id="chTip2">${maxHIdx}–${maxHIdx+1} 时 · ${fmtDur(hourly[maxHIdx])}</div>

/* ═══════════ 云端同步（Supabase） ═══════════ */
let sb=null, me=null, pushTimer=null;
let syncMsg='未配置云端';
function sbConfigured(){ return SUPABASE_URL && SUPABASE_ANON_KEY; }
function initSb(){
  if(!sbConfigured()) return;
  if(window.__sbLibFailed || !window.supabase){ syncMsg='同步组件加载失败，请刷新'; return; }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  sb.auth.getSession().then(({data})=>{
    if(data.session){
      me=data.session.user;
      /* v12 一次性迁移：把旧共享槽的数据认领给启动时已登录的账号 */
      const uk=lsKeyFor(me.id);
      if(!localStorage.getItem(uk) && localStorage.getItem(LS_KEY) && !localStorage.getItem('tt_claimed')){
        localStorage.setItem(uk, localStorage.getItem(LS_KEY));
        localStorage.setItem('tt_claimed', me.id);
      }
      switchUser(me.id);
      syncMsg='已登录'; pullRemote(); loadProfile();
    }
    else syncMsg='未登录';
    renderMe();
  });
}
function encodeNick(nick){
  return 'u'+Array.from(nick).map(ch=>ch.codePointAt(0).toString(36)).join('-')+'@timeapp-sync.com';
}
async function doSignUp(nick, pw){
  const {data, error} = await sb.auth.signUp({
    email: encodeNick(nick), password: pw,
    options:{ data:{ nickname: nick } }
  });
  if(error){
    if(/already/i.test(error.message)) throw '这个昵称已被注册';
    if(/at least 6/i.test(error.message)) throw '密码至少 6 位';
    throw '注册失败：'+error.message;
  }
  me = data.user;
  switchUser(me.id);           // 新账号从空白数据槽开始
  syncMsg='已登录';
  await loadProfile();
  await pushRemote();
}
async function doSignIn(nick, pw){
  const {data, error} = await sb.auth.signInWithPassword({ email: encodeNick(nick), password: pw });
  if(error){
    if(/invalid/i.test(error.message)) throw '昵称或密码不对';
    throw '登录失败：'+error.message;
  }
  me = data.user;
  switchUser(me.id);           // 换到该账号自己的数据槽
  syncMsg='已登录';
  await loadProfile();
  await pullRemote();
}
async function doSignOut(){
  saveLocalOnly();
  await sb.auth.signOut();
  me=null; myProfile=null; syncMsg='未登录';
  switchUser(null);
  renderMe();
}
async function pullRemote(){
  if(!sb || !me || curUid!==me.id) return;
  syncMsg='同步中…'; renderMe();
  try{
    const {data, error} = await sb.from('tt_data').select('payload,updated_at').eq('id', me.id).maybeSingle();
    if(error) throw error;
    if(data && data.payload){
      const remoteAt = data.payload.updatedAt || 0;
      if(remoteAt > (S.updatedAt||0)){
        S = ensureDefaults(data.payload);
        saveLocalOnly();
        renderAll();
      } else if((S.updatedAt||0) > remoteAt){
        await pushRemote(); return;
      }
    } else {
      await pushRemote(); return;   // 云端还没有数据：上传本机
    }
    syncMsg='已同步 '+nowHM();
  }catch(e){ syncMsg='同步失败（网络？）'; }
  renderMe();
}
async function pushRemote(){
  if(!sb || !me || curUid!==me.id) return;   // 防止把别的账号的数据传上去
  syncMsg='同步中…'; renderMe();
  try{
    const {error} = await sb.from('tt_data').upsert({
      id: me.id, payload: S, updated_at: new Date().toISOString()
    });
    if(error) throw error;
    syncMsg='已同步 '+nowHM();
  }catch(e){ syncMsg='同步失败（网络？）'; }
  renderMe();
}
function schedulePush(){
  if(!sb || !me) return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(pushRemote, 2500);
}

  for(const k of Object.keys(S.recs)){ if((S.recs[k]||[]).some(x=>x.id===r.id)) return k; }

async function togglePubIdea(r){
  if(!sb||!me){ toast('公开 idea 需要先登录'); return; }
  if(r.pub){
    const {error}=await sb.from('public_ideas').delete().eq('id',r.id).eq('user_id',me.id);

      id:r.id, user_id:me.id, content:r.note,
      happened_at:new Date(k+'T'+r.start+':00').toISOString()

function fmtStamp(iso){
  if(!iso) return '';
  const d=new Date(iso);
  return `${d.getFullYear()}.${pad(d.getMonth()+1)}.${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
async function ideaCards(ideas, nm, showAuthor){
  if(!ideas.length) return '<div class="soctip">'+(nm?escHtml(nm)+' 还没有公开的 idea':'空空如也')+'</div>';
  const ids=ideas.map(i=>i.id);
  const [lk,fv,cm]=await Promise.all([
    sb.from('idea_likes').select('user_id,idea_id').in('idea_id',ids),
    sb.from('idea_favs').select('user_id,idea_id').in('idea_id',ids),
    sb.from('idea_comments').select('idea_id').in('idea_id',ids),
  ]);
  let authors={};
  if(showAuthor){
    const uids=[...new Set(ideas.map(i=>i.user_id))];
    const {data}=await sb.from('profiles').select('id,display_name').in('id',uids);
    (data||[]).forEach(p=>authors[p.id]=p.display_name);
  }
  return ideas.map(it=>{
    const likes=(lk.data||[]).filter(r=>r.idea_id===it.id);
    const favs=(fv.data||[]).filter(r=>r.idea_id===it.id);
    const cms=(cm.data||[]).filter(r=>r.idea_id===it.id);
    const myLk=likes.some(r=>r.user_id===me.id), myFv=favs.some(r=>r.user_id===me.id);
    return `<div class="ideacard">
      <div class="ideameta">${showAuthor?('🪐 '+escHtml(authors[it.user_id]||'?')+' · '):''}${fmtStamp(it.happened_at)}</div>
      <div class="ideatxt">${escHtml(it.content)}</div>
      <div class="ideaops">
        <button class="minibtn ${myLk?'on':''}" data-like="${it.id}">👍 ${likes.length}</button>
        <button class="minibtn ${myFv?'on':''}" data-fav="${it.id}">⭐ ${favs.length}</button>
        <button class="minibtn" data-cmt="${it.id}">💬 ${cms.length}</button>
      </div></div>`;
  }).join('');
}
function bindIdeaCards(sh){
  sh.querySelectorAll('[data-like],[data-fav]').forEach(b=>b.onclick=async ()=>{
    const isLike=('like' in b.dataset);
    const tbl=isLike?'idea_likes':'idea_favs';
    const id=isLike?b.dataset.like:b.dataset.fav;
    try{
      const {data}=await sb.from(tbl).select('idea_id').eq('user_id',me.id).eq('idea_id',id).maybeSingle();
      if(data){ await sb.from(tbl).delete().eq('user_id',me.id).eq('idea_id',id); b.classList.remove('on'); }
      else { await sb.from(tbl).insert({user_id:me.id, idea_id:id}); b.classList.add('on'); }
      const n=+(b.textContent.match(/\d+/)||[0])[0];
      b.textContent=(isLike?'👍 ':'⭐ ')+(data?n-1:n+1);
    }catch(e){ toast('操作失败'); }
  });
  sh.querySelectorAll('[data-cmt]').forEach(b=>b.onclick=async ()=>{
    const {data}=await sb.from('public_ideas').select('*').eq('id',b.dataset.cmt).maybeSingle();
    if(data) openSoc('comments', data);
  });
}
/* —— 分类导出 —— */
function dlText(name, txt){
  const blob=new Blob([txt],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob); a.download=name; a.click();
  URL.revokeObjectURL(a.href); toast('已导出');
}
function exportIdeas(){
  const out=[];
  Object.keys(S.recs).sort().forEach(k=>{
    const is=(S.recs[k]||[]).filter(r=>r.idea).sort((a,b)=>hmToMin(a.start)-hmToMin(b.start));
    if(!is.length) return;
    out.push('## '+k);
    is.forEach(r=>out.push(r.start+'  '+(r.note||'').replace(/\n/g,'\n      ')+(r.pub?'  [已公开]':'')));
    out.push('');
  });
  dlText('idea-'+todayKey()+'.txt', out.join('\n')||'（还没有 idea）');
}
function exportDiaries(){
  const out=[];
  const dks=Object.keys(S.dayDiary||{}).sort();
  if(dks.length){ out.push('════ 每日日记 ════');
    dks.forEach(k=>{ const d=S.dayDiary[k]; if(!d||(!d.mood&&!(d.text||'').trim())) return;
      out.push('## '+k+(d.mood?' '+d.mood:'')); if((d.text||'').trim()) out.push(d.text.trim()); out.push(''); }); }
  const wks=Object.keys(S.weekDiary||{}).sort();
  if(wks.length){ out.push('════ 每周总结 ════');
    wks.forEach(k=>{ if(!(S.weekDiary[k]||'').trim()) return; out.push('## '+k+' 起的一周'); out.push(S.weekDiary[k].trim()); out.push(''); }); }
  const mks=Object.keys(S.diary||{}).sort();
  if(mks.length){ out.push('════ 每月日记 ════');
    mks.forEach(k=>{ if(!(S.diary[k]||'').trim()) return; out.push('## '+k); out.push(S.diary[k].trim()); out.push(''); }); }
  dlText('日记-'+todayKey()+'.txt', out.join('\n')||'（还没有日记）');
}
function exportTimeline(){
  const out=[];
  Object.keys(S.recs).sort().forEach(k=>{
    const txt=serializeDay(k);
    if(!txt.trim()) return;
    out.push('## '+k); out.push(txt); out.push('');
  });
  dlText('时间轴-'+todayKey()+'.txt', out.join('\n')||'（还没有记录）');
}
