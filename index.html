/* 日期格里的迷你钟面（All 模式） */
function miniClock(k, rs){
  const C=13,R=9,W=5;
  let s=`<svg viewBox="0 0 26 26" width="24" height="24">`;
  s+=`<circle cx="${C}" cy="${C}" r="${R}" stroke="var(--unrec)" stroke-width="${W}" fill="none"/>`;
  implicitSleepSegs(k).forEach(([a,b])=>{
    const a0=a/1440*360, a1=b/1440*360;
    s+=`<path d="${arcPath(C,C,R,a0,Math.max(a1,a0+2))}" stroke="${catById('sleep').color}" stroke-width="${W}" fill="none" opacity=".55"/>`;
  });
  rs.forEach(rec=>{
    const col = rec.cat ? (catById(rec.cat)?.color||'#C9C4B6') : '#C9C4B6';
    recSegs(rec,k).forEach(([a,b])=>{
      const a0=a/1440*360, a1=b/1440*360;
      s+=`<path d="${arcPath(C,C,R,a0,Math.max(a1,a0+2))}" stroke="${col}" stroke-width="${W}" fill="none"/>`;
    });
  });
  return s+`</svg>`;
}
/* 单个标签的月度图表 */
function renderCalChart(){
  const sheet=$('calSheet');
  const [y,m]=calMonth.split('-').map(Number);
  const c = calTag==='_none' ? {name:'未分类',color:'#C9C4B6'} : catById(calTag);
  if(!c){ calTag=null; renderCal(); return; }
  const days=monthDays(calMonth);
  const daily=[], hourly=new Array(24).fill(0);
  for(let d=1;d<=days;d++){
    const k=calMonth+'-'+pad(d);
    let v=0;
    (S.recs[k]||[]).forEach(r=>{
      const match = calTag==='_none' ? r.cat==null : r.cat===calTag;
      if(!match || isMarker(r)) return;
      recSegs(r,k).forEach(([s,e])=>{
        v+=e-s;
        for(let h=Math.floor(s/60); h<Math.ceil(e/60); h++){
          hourly[h]+=Math.min(e,(h+1)*60)-Math.max(s,h*60);
        }
      });
    });
    daily.push(v);
  }
  const maxD=Math.max(...daily,30), maxH=Math.max(...hourly,30);
  const maxIdx=daily.indexOf(Math.max(...daily));
  const maxHIdx=hourly.indexOf(Math.max(...hourly));
  /* 折线图 */
  const W1=340,H1=130,P=26;
  const px=i=>P+i/(days-1)*(W1-2*P), py=v=>H1-18-v/maxD*(H1-36);
  let pts=daily.map((v,i)=>`${px(i)},${py(v)}`).join(' ');
  let line=`<svg viewBox="0 0 ${W1} ${H1}" width="100%" id="lineSvg">
    <line x1="${P}" y1="${H1-18}" x2="${W1-P+8}" y2="${H1-18}" stroke="var(--line)" stroke-width="1"/>
    <polyline points="${pts}" fill="none" stroke="${c.color}" stroke-width="2"/>`;
  daily.forEach((v,i)=>{
    line+=`<circle cx="${px(i)}" cy="${py(v)}" r="5.5" fill="${c.color}" fill-opacity="${v?1:.25}" data-d="${i+1}" data-v="${v}" style="cursor:pointer"/>`;
  });
  [1,Math.round(days/2),days].forEach(d=>{
    line+=`<text x="${px(d-1)}" y="${H1-5}" text-anchor="middle" font-size="10" fill="var(--ink-2)">${d}日</text>`;
  });
  line+=`</svg>`;
  /* 时段柱状图 */
  const W2=340,H2=120,P2=20;
  const bw=(W2-2*P2)/24;
  let bars=`<svg viewBox="0 0 ${W2} ${H2}" width="100%" id="barSvg">
    <line x1="${P2}" y1="${H2-18}" x2="${W2-P2+6}" y2="${H2-18}" stroke="var(--line)" stroke-width="1"/>`;
  hourly.forEach((v,h)=>{
    const bh=v/maxH*(H2-38);
    bars+=`<rect x="${P2+h*bw+1}" y="${H2-18-bh}" width="${bw-2}" height="${Math.max(bh,0.5)}" fill="${c.color}" fill-opacity="${v?0.9:.15}" rx="1.5"/>`;
    bars+=`<rect class="hit" x="${P2+h*bw}" y="0" width="${bw}" height="${H2-18}" fill="transparent" data-h="${h}" data-v="${v}" style="cursor:pointer"/>`;
  });
  [0,6,12,18,24].forEach(h=>{
    bars+=`<text x="${P2+h*bw}" y="${H2-5}" text-anchor="middle" font-size="10" fill="var(--ink-2)">${h}</text>`;
  });
  bars+=`</svg>`;
  sheet.innerHTML=`
    <div class="calhead">
      <button class="back" id="chBack">‹ 返回</button>
      <div class="mtitle" style="flex:1;text-align:center">${c.name} · ${y}年${m}月</div>
      <button class="close" id="chClose">✕</button>
    </div>
    <div class="calchart">
      <h4>每天的时长（点圆点看具体数值）</h4>
      <div class="tipline" id="chTip">${m}月${maxIdx+1}日 · ${fmtDur(daily[maxIdx])}</div>
      <div class="chartbox">${line}</div>
      <h4>累计时长的时段分布（0–24 时，点柱子看数值）</h4>
      <div class="tipline" id="chTip2">${maxHIdx}–${maxHIdx+1} 时 · ${fmtDur(hourly[maxHIdx])}</div>
      <div class="chartbox">${bars}</div>
    </div>`;
  $('chBack').onclick=()=>{ calTag=null; renderCal(); };
  $('chClose').onclick=closeCal;
  sheet.querySelectorAll('#lineSvg circle').forEach(dot=>
    dot.addEventListener('click',()=>{
      $('chTip').textContent=`${m}月${dot.dataset.d}日 · ${fmtDur(+dot.dataset.v)}`;
    }));
  sheet.querySelectorAll('#barSvg .hit').forEach(rc=>
    rc.addEventListener('click',()=>{
      $('chTip2').textContent=`${rc.dataset.h}–${+rc.dataset.h+1} 时 · ${fmtDur(+rc.dataset.v)}`;
    }));
}

/* ═══════════ 云端同步（Supabase） ═══════════ */
let sb=null, me=null, pushTimer=null;
let syncMsg='未配置云端';
function sbConfigured(){ return SUPABASE_URL && SUPABASE_ANON_KEY; }
function initSb(){
  if(!sbConfigured()) return;
  if(window.__sbLibFailed || !window.supabase){ syncMsg='同步组件加载失败，请刷新'; return; }
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  sb.auth.getSession().then(({data})=>{
    if(data.session){ me=data.session.user; syncMsg='已登录'; pullRemote(); }
    else syncMsg='未登录';
    renderMe();
  });
}
function encodeNick(nick){
  return 'u'+Array.from(nick).map(ch=>ch.codePointAt(0).toString(36)).join('-')+'@timeapp-sync.com';
}
async function doSignUp(nick, pw){
  const {data, error} = await sb.auth.signUp({
    email: encodeNick(nick), password: pw,
    options:{ data:{ nickname: nick } }
  });
  if(error){
    if(/already/i.test(error.message)) throw '这个昵称已被注册';
    if(/at least 6/i.test(error.message)) throw '密码至少 6 位';
    throw '注册失败：'+error.message;
  }
  me = data.user;
  syncMsg='已登录';
  await pushRemote();          // 新账号：把本机数据上传
}
async function doSignIn(nick, pw){
  const {data, error} = await sb.auth.signInWithPassword({ email: encodeNick(nick), password: pw });
  if(error){
    if(/invalid/i.test(error.message)) throw '昵称或密码不对';
    throw '登录失败：'+error.message;
  }
  me = data.user;
  syncMsg='已登录';
  await pullRemote();
}
async function doSignOut(){
  await sb.auth.signOut();
  me=null; syncMsg='未登录'; renderMe();
}
async function pullRemote(){
  if(!sb || !me) return;
  syncMsg='同步中…'; renderMe();
  try{
    const {data, error} = await sb.from('tt_data').select('payload,updated_at').eq('id', me.id).maybeSingle();
    if(error) throw error;
    if(data && data.payload){
      const remoteAt = data.payload.updatedAt || 0;
      if(remoteAt > (S.updatedAt||0)){
        S = ensureDefaults(data.payload);
        saveLocalOnly();
        renderAll();
      } else if((S.updatedAt||0) > remoteAt){
        await pushRemote(); return;
      }
    } else {
      await pushRemote(); return;   // 云端还没有数据：上传本机
    }
    syncMsg='已同步 '+nowHM();
  }catch(e){ syncMsg='同步失败（网络？）'; }
  renderMe();
}
async function pushRemote(){
  if(!sb || !me) return;
  syncMsg='同步中…'; renderMe();
  try{
    const {error} = await sb.from('tt_data').upsert({
      id: me.id, payload: S, updated_at: new Date().toISOString()
    });
    if(error) throw error;
    syncMsg='已同步 '+nowHM();
  }catch(e){ syncMsg='同步失败（网络？）'; }
  renderMe();
}
function schedulePush(){
  if(!sb || !me) return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(pushRemote, 2500);
}

      <h3>数据备份（JSON）</h3>

  if(sbConfigured() && !me && sb){

}
async function authGo(isSignup){
  const nick=$('inNick').value.trim(), pw=$('inPw').value;
  if(!nick || nick.length>10 || /[@\s]/.test(nick)){ toast('昵称需 1-10 个字符，不含空格和@'); return; }
  if(pw.length<6){ toast('密码至少 6 位'); return; }
  try{
    if(isSignup) await doSignUp(nick,pw); else await doSignIn(nick,pw);
    toast(isSignup?'注册成功，已登录':'登录成功');
    renderMe(); renderAll();
  }catch(msg){ toast(String(msg)); renderMe(); }
}

/* ═══════════ 导出 / 导入 ═══════════ */
function exportJSON(){
  const blob=new Blob([JSON.stringify({app:'time-tracker',version:2,exportedAt:new Date().toISOString(),cats:S.cats,recs:S.recs,diary:S.diary,dayDiary:S.dayDiary,todos:S.todos,weekDiary:S.weekDiary},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='时间手账-'+todayKey()+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('已导出');
}
$('fileIn').onchange = e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const d=JSON.parse(rd.result);
      if(!d.cats || !d.recs) throw 0;
      importDialog(d);
    }catch(_){ toast('文件格式不对'); }
  };
  rd.readAsText(f);
  e.target.value='';
};
function importDialog(d){
  const ov=document.createElement('div');
  ov.className='overlay show'; ov.style.alignItems='center';
  ov.innerHTML=`<div class="tagmenu">
    <div class="tmtitle">选择导入方式</div>
    <div style="font-size:12.5px;color:var(--ink-2);line-height:1.9;margin-bottom:13px">
      <b>合并</b>：只填补当前没有记录的日期，两边取并集，已有日期保持不变。<br>
      <b>全部覆盖</b>：清除当前全部数据，完全替换为文件内容。</div>
    <div class="btns">
      <button data-a="merge">合并（推荐）</button>
      <button data-a="all" class="danger">全部覆盖</button>
      <button data-a="x">取消</button>
    </div></div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.onclick=ev=>{ if(ev.target===ov) close(); };
  ov.querySelector('[data-a="x"]').onclick=close;
  ov.querySelector('[data-a="all"]').onclick=async ()=>{
    close();
    if(!await uiConfirm('确定清除当前全部数据并替换？此操作不可恢复')) return;
    S = ensureDefaults({cats:d.cats, recs:d.recs, diary:d.diary||{}, dayDiary:d.dayDiary||{}, todos:d.todos||{}, weekDiary:d.weekDiary||{}, mode:S.mode});
    save(); renderAll(); renderMe(); toast('已全部覆盖导入');
  };
  ov.querySelector('[data-a="merge"]').onclick=()=>{
    close();
    const n=mergeImport(d);
    save(); renderAll(); renderMe();
    toast(n?('合并完成：填补了 '+n+' 天的记录'):'合并完成：没有需要填补的日期');
  };
}
function mergeImport(d){
  /* 标签合并：id 相同沿用；同名不同 id 重映射；全新标签加入 */
  const remap={};
  (d.cats||[]).forEach(c=>{
    if(catById(c.id)) return;
    const same=S.cats.find(x=>x.name===c.name);
    if(same){ remap[c.id]=same.id; return; }
    S.cats.push(c);
  });
  const fix=cat=>(cat&&remap[cat])?remap[cat]:cat;
  let added=0;
  Object.keys(d.recs||{}).forEach(k=>{
    if(S.recs[k] && S.recs[k].length) return;      // 已有记录的日期：不动
    const day=(d.recs[k]||[]).map(r=>({...r, cat:fix(r.cat)}));
    if(day.length){ S.recs[k]=day; added++; }
  });
  Object.keys(d.todos||{}).forEach(k=>{
    if(S.todos[k] && S.todos[k].length) return;
    if((d.todos[k]||[]).length) S.todos[k]=d.todos[k];
  });
  Object.keys(d.dayDiary||{}).forEach(k=>{
    const cur=S.dayDiary[k];
    if(cur && ((cur.text&&cur.text.trim())||cur.mood)) return;
    S.dayDiary[k]=d.dayDiary[k];
  });
  Object.keys(d.diary||{}).forEach(k=>{
    if(S.diary[k] && S.diary[k].trim()) return;
    S.diary[k]=d.diary[k];
  });
  Object.keys(d.weekDiary||{}).forEach(k=>{
    if(S.weekDiary[k] && S.weekDiary[k].trim()) return;
    S.weekDiary[k]=d.weekDiary[k];
  });
  return added;
}

/* ═══════════ 页面切换 ═══════════ */
$('navRec').onclick=()=>switchPage('record');
$('navSta').onclick=()=>switchPage('stats');
$('navMe').onclick=()=>switchPage('me');
function switchPage(p){
  curPage=p;
  $('navRec').classList.toggle('on',p==='record');
  $('navSta').classList.toggle('on',p==='stats');
  $('navMe').classList.toggle('on',p==='me');
  $('pageRecord').style.display = p==='record'?'block':'none';
  $('pageStats').style.display  = p==='stats'?'block':'none';
  $('pageMe').style.display     = p==='me'?'block':'none';
  if(p!=='record'){ exitEdit(true); exitIdea(true); }
  $('fab').style.display        = (p==='record' && !editMode) ? 'flex':'none';
  $('fabIdea').style.display    = (p==='record' && !ideaMode) ? 'flex':'none';
  if(p==='stats') renderStats();
  if(p==='me') renderMe();
}

     /* ═══════════ 筛选切换 ═══════════ */
document.querySelectorAll('.filter-toggle').forEach(cb => {
  cb.onchange = ()=>{
    const type = cb.dataset.type;
    if(type === 'idea') showIdea = cb.checked;
    if(type === 'todo') showTodo = cb.checked;
    if(type === 'timeline') showTimeline = cb.checked;
    renderAll();
  };
});
// 由于筛选按钮在页面加载后才存在，用事件委托
document.addEventListener('change', (e)=>{
  if(e.target.classList.contains('filter-toggle')){
    const type = e.target.dataset.type;
    if(type === 'idea') showIdea = e.target.checked;
    if(type === 'todo') showTodo = e.target.checked;
    if(type === 'timeline') showTimeline = e.target.checked;
    renderAll();
  }
});
/* ═══════════ 汇总渲染 ═══════════ */
function renderAll(){
  renderDate();
  renderTags();
  renderRecs();
  renderTodos();
  const run=runningRec();
  $('runBadge').textContent = run ? `计时中 ${catById(run.cat)?.name||''} ${fmtDur(recDur(run,todayKey()))}` : '';
  if(curPage==='stats') renderStats();
}
function toast(msg){
  const t=$('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tm);
  t._tm=setTimeout(()=>t.classList.remove('show'),2000);
}
/* ═══════════ 自定义弹框（替代 prompt/confirm） ═══════════ */
function uiDialog(opts){
  return new Promise(res=>{
    const ov=document.createElement('div');
    ov.className='overlay show';
    ov.style.zIndex=70;
    ov.style.alignItems = opts.input ? 'flex-start' : 'center';
    ov.innerHTML=`<div class="tagmenu" ${opts.input?'style="margin-top:13vh"':''}>
      <div class="tmtitle">${opts.title}</div>
      ${opts.input?`<input class="dlgin" type="text" placeholder="${escHtml(opts.placeholder||'')}" value="${escHtml(opts.value||'')}">`:''}
      <div class="btns">
        <button data-a="ok" ${opts.danger?'class="danger"':''}>${opts.okText||'确定'}</button>
        <button data-a="x">取消</button>
      </div></div>`;
    document.body.appendChild(ov);
    const inp=ov.querySelector('.dlgin');
    const close=v=>{ ov.remove(); res(v); };
    const ok=()=>close(inp ? inp.value : true);
    if(inp){
      setTimeout(()=>{ inp.focus(); inp.select(); }, 60);
      inp.addEventListener('keydown',e=>{ if(e.key==='Enter') ok(); });
    }
    ov.onclick=e=>{ if(e.target===ov) close(null); };
    ov.querySelector('[data-a="ok"]').onclick=ok;
    ov.querySelector('[data-a="x"]').onclick=()=>close(null);
  });
}
function uiPrompt(title, placeholder, value){
  return uiDialog({title, input:true, placeholder:placeholder||'', value:value||''});
}
async function uiConfirm(title){
  return (await uiDialog({title, danger:true})) === true;
}
/* ═══════════ 键盘防遮挡 ═══════════ */
function easeKeyboard(ta){
  ta.addEventListener('focus',()=>{
    const host = ta.closest('.sheet') || document.body;
    host.style.paddingBottom='45vh';
    setTimeout(()=>{ try{ ta.scrollIntoView({block:'center',behavior:'smooth'}); }catch(e){} }, 250);
    const restore=()=>{ host.style.paddingBottom=''; ta.removeEventListener('blur',restore); };
    ta.addEventListener('blur',restore);
  });
}
setInterval(()=>{ if(runningRec() && !editMode) renderAll(); }, 30000);
setInterval(checkReminders, 20000);
checkReminders();
document.addEventListener('visibilitychange',()=>{ if(!document.hidden){ renderAll(); checkReminders(); if(me) pullRemote(); } });

/* ═══════════ 滑动手势 ═══════════ */
let swX=0, swY=0, swOK=false;
document.addEventListener('touchstart', e=>{
  const t=e.target;
  swOK = !editMode
    && !t.closest('.tags') && !t.closest('.overlay')
    && !t.closest('textarea') && !t.closest('input');
  swX=e.touches[0].clientX; swY=e.touches[0].clientY;
}, {passive:true});
document.addEventListener('touchend', e=>{
  if(!swOK) return;
  const dx=e.changedTouches[0].clientX-swX, dy=e.changedTouches[0].clientY-swY;
  if(Math.abs(dx)<70 || Math.abs(dx)<Math.abs(dy)*1.8) return;
  const order=['record','stats','me'];
  let i=order.indexOf(curPage) + (dx<0?1:-1);
  if(i>=0 && i<order.length) switchPage(order[i]);
}, {passive:true});
(function(){
  const sh=$('calSheet');
  let x0=0, y0=0;
  sh.addEventListener('touchstart', e=>{ x0=e.touches[0].clientX; y0=e.touches[0].clientY; }, {passive:true});
  sh.addEventListener('touchend', e=>{
    if(calTag) return;
    if(sh.querySelector('#ddTa')) return;                 // 当日日记页不翻
    if(e.target.closest('textarea')) return;
    const dx=e.changedTouches[0].clientX-x0, dy=e.changedTouches[0].clientY-y0;
    if(Math.abs(dx)<70 || Math.abs(dx)<Math.abs(dy)*1.8) return;
    if(calView==='week'){ calWeekStart=shiftDay(calWeekStart, dx<0?7:-7); }
    else { calMonth=shiftMonth(calMonth, dx<0?1:-1); }
    renderCal();
  }, {passive:true});
})();

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
initSb();
renderAll();
