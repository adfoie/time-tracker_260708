const P = { on:false, showIdea:true, rel:'all', raf:0,autoRotate: true }; /v13添加 autoRotate: true,
function loadThree(cb){
  if(window.THREE){ cb(); return; }
  const s=document.createElement('script');
  s.src='https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js';
  s.onload=cb;
  s.onerror=()=>{ toast('3D 引擎加载失败，请检查网络后重试'); closePlanet(); };
  document.head.appendChild(s);
}
async function openPlanet(){
  if(!sb || !me){ toast('先登录再进入星球'); return; }
  $('planetOverlay').style.display='block';
  $('plHint').textContent='正在加载星球数据…';
  P.on=true;
  loadThree(()=>buildPlanet());
}
function closePlanet(){
  P.on=false;
  cancelAnimationFrame(P.raf);
  $('planetOverlay').style.display='none';
}
async function fetchPlanetData(){
  const [a,b] = await Promise.all([
    sb.from('profiles').select('*').limit(150),
    sb.from('follows').select('follower,followee'),
  ]);
  const fols=b.data||[];
  const iFollow=new Set(fols.filter(f=>f.follower===me.id).map(f=>f.followee));
  const golden={};
  try{
    const d0=new Date(); d0.setHours(0,0,0,0);
    const {data:ri}=await sb.from('public_ideas').select('user_id').gte('created_at', d0.toISOString());
    (ri||[]).forEach(r=>{ if(iFollow.has(r.user_id)) golden[r.user_id]=true; });
  }catch(e){}
  const folCnt={};
  fols.forEach(f=>{ folCnt[f.followee]=(folCnt[f.followee]||0)+1; });
  return { profs:a.data||[], fols, golden, folCnt };
}
function hashPos(id){
  let h=7; for(const c of id) h=(h*31 + c.charCodeAt(0))>>>0;
  const r = 50 + (h%1000)/1000*62;
  const th = ((h>>>8)%1000)/1000*Math.PI*2;
  const ph = Math.acos(2*(((h>>>16)%1000)/1000)-1);
  return [ r*Math.sin(ph)*Math.cos(th), r*Math.cos(ph)*0.55, r*Math.sin(ph)*Math.sin(th) ];
}
function hexToRgba(hex,a){
  const n=parseInt(hex.slice(1),16);
  return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`;
}
/* 荧光光晕贴图：径向渐变 + 十字星芒（参考真实星光） */
function makeGlow(hex, size, spikes){
  const cv=document.createElement('canvas'); cv.width=cv.height=128;
  const g=cv.getContext('2d');
  const grad=g.createRadialGradient(64,64,0,64,64,62);
  grad.addColorStop(0,'rgba(255,255,255,0.95)');
  grad.addColorStop(0.16,hexToRgba(hex,0.9));
  grad.addColorStop(0.42,hexToRgba(hex,0.28));
  grad.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=grad; g.fillRect(0,0,128,128);
  if(spikes){
    g.globalCompositeOperation='lighter';
    g.strokeStyle='rgba(235,244,255,0.9)';
    g.lineWidth=1.6;
    g.beginPath();
    g.moveTo(64,2); g.lineTo(64,126);
    g.moveTo(2,64); g.lineTo(126,64);
    g.stroke();
    g.strokeStyle=hexToRgba(hex,0.5);
    g.lineWidth=4;
    g.beginPath();
    g.moveTo(64,18); g.lineTo(64,110);
    g.moveTo(18,64); g.lineTo(110,64);
    g.stroke();
  }
  const tex=new THREE.CanvasTexture(cv);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({
    map:tex, transparent:true, blending:THREE.AdditiveBlending, depthWrite:false }));
  sp.scale.set(size,size,1);
  return sp;
}
function nameSprite(text, isMe){
  const cv=document.createElement('canvas');
  cv.width=256; cv.height=64;
  const g=cv.getContext('2d');
  g.font='600 30px sans-serif';
  g.textAlign='center'; g.textBaseline='middle';
  g.shadowColor='rgba(0,0,0,.9)'; g.shadowBlur=8;
  g.fillStyle = isMe ? '#A9D0FF' : '#D8DCE6';
  g.fillText((text||'?').slice(0,10), 128, 32);
  const tex=new THREE.CanvasTexture(cv);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex, transparent:true, depthTest:false}));
  sp.scale.set(26,6.5,1);
  return sp;
}
async function buildPlanet(){
  let data;
  try{ data=await fetchPlanetData(); }
  catch(e){ toast('星球数据加载失败（网络？）'); closePlanet(); return; }
  const {profs,fols,golden,folCnt}=data;
  const cvs=$('plCanvas');
  const wrap=$('planetOverlay');
  const W2=wrap.clientWidth, H2=wrap.clientHeight;
  if(!P.renderer){
    P.renderer=new THREE.WebGLRenderer({canvas:cvs, antialias:true, alpha:true});
    P.scene=new THREE.Scene();
    P.camera=new THREE.PerspectiveCamera(55, W2/H2, 0.1, 1200);
    P.camera.position.set(0,8,168);
    P.scene.add(new THREE.AmbientLight(0xffffff, .7));
    const pl=new THREE.PointLight(0x9db8ff, 1.0); pl.position.set(60,90,120);
    P.scene.add(pl);
    const starGeo=new THREE.BufferGeometry();
    const pts=[];
    for(let i=0;i<450;i++) pts.push((Math.random()-0.5)*720,(Math.random()-0.5)*720,(Math.random()-0.5)*720);
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(pts,3));
    P.scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0x8892b0,size:1.1,transparent:true,opacity:.65})));
    window.addEventListener('resize',()=>{
      if(!P.on) return;
      const w=wrap.clientWidth,h=wrap.clientHeight;
      P.renderer.setSize(w,h); P.camera.aspect=w/h; P.camera.updateProjectionMatrix();
    });
    bindPlanetInput(cvs);
  }
  P.renderer.setSize(W2,H2);
  P.camera.aspect=W2/H2; P.camera.updateProjectionMatrix();
  if(P.group) P.scene.remove(P.group);
  P.group=new THREE.Group();
  P.nodes=[]; P.lines=[];
  const byId={};
  profs.forEach(p=>{
    const isMe = p.id===me.id;
    const gold = P.showIdea && golden[p.id] && !isMe;
    const g=new THREE.Group();
    g.position.set(...(isMe ? [0,0,0] : hashPos(p.id)));
    /* 节点大小随粉丝数：√粉丝数 递增，上限约 3 倍面积 */
    const fc=folCnt[p.id]||0;
    const rad = isMe ? 3.1 : Math.min(3.2 + Math.sqrt(fc)*1.15, 7.2);
    const mat = isMe
      ? new THREE.MeshStandardMaterial({color:0xCFE4FF, emissive:0x5FA8FF, emissiveIntensity:1.5})
      : gold
      ? new THREE.MeshStandardMaterial({color:0xE8B84D, emissive:0xA855F7, emissiveIntensity:1.25})
      : new THREE.MeshStandardMaterial({color:0x8A93A6, emissive:0x39404F, emissiveIntensity:1.5});
    const sp=new THREE.Mesh(new THREE.SphereGeometry(rad, 22,22), mat);
    sp.userData={uid:p.id, nm:p.display_name, isMe};
    g.add(sp);
    if(isMe) g.add(makeGlow('#5FA8FF', 34, false));          // 蓝色荧光 + 十字星芒
    else if(gold) g.add(makeGlow('#B379A5', 18, false));    // 金紫荧光：今天有新 idea  #b379a5
    const lb=nameSprite(p.display_name, isMe);
    lb.position.set(0, rad+5.2, 0);
    g.add(lb);
    g.userData={phase:Math.random()*6.28, baseY:g.position.y, mesh:sp};
    P.group.add(g);
    P.nodes.push(g);
    byId[p.id]=g;
  });
  fols.forEach(f=>{
    const A=byId[f.follower], B=byId[f.followee];
    if(!A||!B) return;
    const rel = f.followee===me.id ? 'in' : (f.follower===me.id ? 'out' : 'other');
    const geo=new THREE.BufferGeometry().setFromPoints([A.position.clone(), B.position.clone()]);
    const ln=new THREE.Line(geo, new THREE.LineBasicMaterial({transparent:true}));
    ln.userData={rel, a:A, b:B};
    P.group.add(ln);
    P.lines.push(ln);
  });
  P.scene.add(P.group);
  applyRel();
  $('plHint').textContent='拖动空白旋转 · 拖动星球挪位置 · 双指/滚轮缩放 · 点星球看TA的公开idea';
  animatePlanet();
}

// ★ 在 applyRel 函数上方定义配置
const GLOW_CONFIG = {
  // 高亮连线
  highlight: {
    color: 0xC78BFF,
    opacity: 0.92,
    glowColor: 0xA855F7,
    glowOpacity: 0.4,
    glowSize: 6,
  },
  // 背景连线
  background: {
    color: 0x8892A8,
    opacity: 0.30,
  },
  // 光晕 Sprite 设置
  sprite: {
    enabled: true,
    size: 6,
    opacity: 0.4,
  }
};

function applyRel(){
  // 清除旧的光晕
  if(P.glowObjects) {
    P.glowObjects.forEach(obj => P.group.remove(obj));
    P.glowObjects = [];
  }
  
  const glowObjects = [];
  
  (P.lines||[]).forEach(ln=>{
    const m=ln.material;
    const rel = ln.userData.rel;
    
    if(P.rel === 'all'){
      // 所有关系都显示，但不同关系用不同颜色
      if(rel === 'in'){
        m.color.set(0x6FA8FF);   // 蓝色：关注我的
        m.opacity=0.8;
        m.blending=THREE.AdditiveBlending;
      } else if(rel === 'out'){
        m.color.set(0xB0B8C8);   // 银灰色：我关注的
        m.opacity=0.8;
        m.blending=THREE.AdditiveBlending;
      } else {
        m.color.set(0x8892A8);   // 灰色：其他关系
        m.opacity=0.55;
        m.blending=THREE.AdditiveBlending;
      }
      
      // ★ 为关注关系添加光晕
      if(GLOW_CONFIG.sprite.enabled && (rel === 'in' || rel === 'out')){
        const color = rel === 'in' ? 0x6FA8FF : 0xB0B8C8;
        addGlowSpriteToLine(ln, glowObjects, color, GLOW_CONFIG.sprite.opacity, GLOW_CONFIG.sprite.size);
      }
      
    } else {
      const lit = rel === P.rel;
      if(lit){ 
        m.color.set(GLOW_CONFIG.highlight.color); 
        m.opacity = GLOW_CONFIG.highlight.opacity; 
        m.blending = THREE.AdditiveBlending;
        
        // ★ 为高亮连线添加光晕
        if(GLOW_CONFIG.sprite.enabled){
          addGlowSpriteToLine(ln, glowObjects, GLOW_CONFIG.highlight.glowColor, GLOW_CONFIG.highlight.glowOpacity, GLOW_CONFIG.highlight.glowSize);
        }
        
      } else { 
        m.color.set(GLOW_CONFIG.background.color); 
        m.opacity = GLOW_CONFIG.background.opacity; 
        m.blending = THREE.NormalBlending; 
      }
    }
    m.needsUpdate=true;
  });
  
  P.glowObjects = glowObjects;
  
  // 更新按钮状态
  [['plRelIn','in'],['plRelOut','out'],['plRelAll','all']].forEach(([id,v])=>{
    const el=$(id); if(el) el.classList.toggle('on', P.rel===v);
  });
}

// ★ 辅助函数
function addGlowSpriteToLine(ln, glowObjects, color, opacity, size){
  const pos = ln.geometry.attributes.position;
  if(pos && pos.count === 2){
    const midX = (pos.getX(0) + pos.getX(1)) / 2;
    const midY = (pos.getY(0) + pos.getY(1)) / 2;
    const midZ = (pos.getZ(0) + pos.getZ(1)) / 2;
    
    const canvas = document.createElement('canvas');
    canvas.width = 64;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    const hex = '#' + color.toString(16).padStart(6, '0');
    const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
    gradient.addColorStop(0, hex + 'ff');
    gradient.addColorStop(0.3, hex + '88');
    gradient.addColorStop(0.7, hex + '33');
    gradient.addColorStop(1, hex + '00');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, 64, 64);
    
    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({
      map: texture,
      transparent: true,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      opacity: opacity,
    });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.set(midX, midY, midZ);
    sprite.scale.set(size || 6, size || 6, 1);
    P.group.add(sprite);
    glowObjects.push(sprite);
  }
}


     
function animatePlanet(){
  if(!P.on) return;
  const t=performance.now()/1000;
  P.nodes.forEach(g=>{
    if(g===P.dragGrp) return;
    g.position.y = g.userData.baseY + Math.sin(t*0.55 + g.userData.phase)*2.0;
  });
  P.lines.forEach(ln=>{
    ln.geometry.setFromPoints([ln.userData.a.position.clone(), ln.userData.b.position.clone()]);
  });
  // ★ 根据 autoRotate 状态决定是否旋转
  if(!P.rotating && !P.dragGrp && !P.pinch && P.autoRotate) {
    P.group.rotation.y += 0.0011;
  }
  P.renderer.render(P.scene, P.camera);
  P.raf=requestAnimationFrame(animatePlanet);
}
function bindPlanetInput(cvs){
  const ray=new THREE.Raycaster(), v2=new THREE.Vector2();
  const tmpV=new THREE.Vector3(), plane=new THREE.Plane();
  const ptrs=new Map();
  let sx=0, sy=0, moved=0, hitNode=null, pinchD=0;
  const toNDC=(x,y)=>{
    const r=cvs.getBoundingClientRect();
    v2.x=((x-r.left)/r.width)*2-1;
    v2.y=-((y-r.top)/r.height)*2+1;
  };
  const pick=(x,y)=>{
    toNDC(x,y);
    ray.setFromCamera(v2, P.camera);
    const hits=ray.intersectObjects(P.nodes.map(g=>g.userData.mesh));
    return hits.length ? hits[0].object.parent : null;
  };
  cvs.addEventListener('pointerdown',e=>{
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    cvs.setPointerCapture(e.pointerId);
    if(ptrs.size===2){                             // 双指缩放开始
      const [a,b]=[...ptrs.values()];
      pinchD=Math.hypot(a.x-b.x,a.y-b.y);
      P.pinch=true; P.rotating=false; P.dragGrp=null;
      return;
    }
    sx=e.clientX; sy=e.clientY; moved=0;
    hitNode=pick(e.clientX,e.clientY);
    P.dragGrp = hitNode || null;
    P.rotating = !hitNode;
  });
  cvs.addEventListener('pointermove',e=>{
    if(!ptrs.has(e.pointerId)) return;
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(P.pinch && ptrs.size===2){                  // 双指缩放
      const [a,b]=[...ptrs.values()];
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if(pinchD>0){
        P.camera.position.z=Math.max(55, Math.min(400, P.camera.position.z*pinchD/d));
      }
      pinchD=d;
      return;
    }
    const dx=e.clientX-sx, dy=e.clientY-sy;
    moved=Math.max(moved, Math.abs(dx)+Math.abs(dy));
    if(P.dragGrp){                                 // 拖动节点：连线自动跟随
      toNDC(e.clientX,e.clientY);
      ray.setFromCamera(v2, P.camera);
      P.dragGrp.getWorldPosition(tmpV);
      plane.setFromNormalAndCoplanarPoint(
        P.camera.getWorldDirection(new THREE.Vector3()).negate(), tmpV);
      const hitP=new THREE.Vector3();
      if(ray.ray.intersectPlane(plane, hitP)){
        P.group.worldToLocal(hitP);
        P.dragGrp.position.copy(hitP);
        P.dragGrp.userData.baseY=hitP.y;
      }
    } else if(P.rotating){                         // 拖动空白：旋转星系
      P.group.rotation.y += dx*0.005;
      P.group.rotation.x = Math.max(-0.9, Math.min(0.9, P.group.rotation.x + dy*0.003));
      sx=e.clientX; sy=e.clientY;
    }
  });
  const up=e=>{
    ptrs.delete(e.pointerId);
    if(ptrs.size<2) P.pinch=false;
    if(ptrs.size>0) return;
    if(moved<8 && hitNode){                        // 轻点节点：看公开 idea（含自己）
      const u=hitNode.userData.mesh.userData;
      openSoc('person',{uid:u.uid, nm:u.nm});
    }
    P.dragGrp=null; P.rotating=false; hitNode=null;
  };
  cvs.addEventListener('pointerup',up);
  cvs.addEventListener('pointercancel',up);
  cvs.addEventListener('wheel',e=>{                // 电脑滚轮缩放
    e.preventDefault();
    P.camera.position.z=Math.max(55, Math.min(400, P.camera.position.z*(e.deltaY>0?1.08:0.93)));
  },{passive:false});
  cvs.addEventListener('contextmenu',e=>e.preventDefault());
}

/* ═══════════ 导出 / 导入 ═══════════ */
function exportJSON(){
  const blob=new Blob([JSON.stringify({app:'time-tracker',version:2,exportedAt:new Date().toISOString(),cats:S.cats,recs:S.recs,diary:S.diary,dayDiary:S.dayDiary,todos:S.todos,weekDiary:S.weekDiary},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='时间手账-'+todayKey()+'.json';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('已导出');
}
$('fileIn').onchange = e=>{
  const f=e.target.files[0]; if(!f) return;
  const rd=new FileReader();
  rd.onload=()=>{
    try{
      const d=JSON.parse(rd.result);
      if(!d.cats || !d.recs) throw 0;
      importDialog(d);
    }catch(_){ toast('文件格式不对'); }
  };
  rd.readAsText(f);
  e.target.value='';
};
function importDialog(d){
  const ov=document.createElement('div');
  ov.className='overlay show'; ov.style.alignItems='center';
  ov.innerHTML=`<div class="tagmenu">
    <div class="tmtitle">选择导入方式</div>
    <div style="font-size:12.5px;color:var(--ink-2);line-height:1.9;margin-bottom:13px">
      <b>合并</b>：只填补当前没有记录的日期，两边取并集，已有日期保持不变。<br>
      <b>全部覆盖</b>：清除当前全部数据，完全替换为文件内容。</div>
    <div class="btns">
      <button data-a="merge">合并（推荐）</button>
      <button data-a="all" class="danger">全部覆盖</button>
      <button data-a="x">取消</button>
    </div></div>`;
  document.body.appendChild(ov);
  const close=()=>ov.remove();
  ov.onclick=ev=>{ if(ev.target===ov) close(); };
  ov.querySelector('[data-a="x"]').onclick=close;
  ov.querySelector('[data-a="all"]').onclick=async ()=>{
    close();
    if(!await uiConfirm('确定清除当前全部数据并替换？此操作不可恢复')) return;
    S = ensureDefaults({cats:d.cats, recs:d.recs, diary:d.diary||{}, dayDiary:d.dayDiary||{}, todos:d.todos||{}, weekDiary:d.weekDiary||{}, mode:S.mode});
    save(); renderAll(); renderMe(); toast('已全部覆盖导入');
  };
  ov.querySelector('[data-a="merge"]').onclick=()=>{
    close();
    const n=mergeImport(d);
    save(); renderAll(); renderMe();
    toast(n?('合并完成：填补了 '+n+' 天的记录'):'合并完成：没有需要填补的日期');
  };
}
function mergeImport(d){
  /* 标签合并：id 相同沿用；同名不同 id 重映射；全新标签加入 */
  const remap={};
  (d.cats||[]).forEach(c=>{
    if(catById(c.id)) return;
    const same=S.cats.find(x=>x.name===c.name);
    if(same){ remap[c.id]=same.id; return; }
    S.cats.push(c);
  });
  const fix=cat=>(cat&&remap[cat])?remap[cat]:cat;
  let added=0;
  Object.keys(d.recs||{}).forEach(k=>{
    if(S.recs[k] && S.recs[k].length) return;      // 已有记录的日期：不动
    const day=(d.recs[k]||[]).map(r=>({...r, cat:fix(r.cat)}));
    if(day.length){ S.recs[k]=day; added++; }
  });
  Object.keys(d.todos||{}).forEach(k=>{
    if(S.todos[k] && S.todos[k].length) return;
    if((d.todos[k]||[]).length) S.todos[k]=d.todos[k];
  });
  Object.keys(d.dayDiary||{}).forEach(k=>{
    const cur=S.dayDiary[k];
    if(cur && ((cur.text&&cur.text.trim())||cur.mood)) return;
    S.dayDiary[k]=d.dayDiary[k];
  });
  Object.keys(d.diary||{}).forEach(k=>{
    if(S.diary[k] && S.diary[k].trim()) return;
    S.diary[k]=d.diary[k];
  });
  Object.keys(d.weekDiary||{}).forEach(k=>{
    if(S.weekDiary[k] && S.weekDiary[k].trim()) return;
    S.weekDiary[k]=d.weekDiary[k];
  });
  return added;
}

/* ═══════════ 自定义弹框（替代 prompt/confirm） ═══════════ */
function uiDialog(opts){
  return new Promise(res=>{
    const ov=document.createElement('div');
    ov.className='overlay show';
    ov.style.zIndex=70;
    ov.style.alignItems = opts.input ? 'flex-start' : 'center';
    ov.innerHTML=`<div class="tagmenu" ${opts.input?'style="margin-top:13vh"':''}>
      <div class="tmtitle">${opts.title}</div>
      ${opts.input?`<input class="dlgin" type="text" placeholder="${escHtml(opts.placeholder||'')}" value="${escHtml(opts.value||'')}">`:''}
      <div class="btns">
        <button data-a="ok" ${opts.danger?'class="danger"':''}>${opts.okText||'确定'}</button>
        <button data-a="x">取消</button>
      </div></div>`;
    document.body.appendChild(ov);
    const inp=ov.querySelector('.dlgin');
    const close=v=>{ ov.remove(); res(v); };
    const ok=()=>close(inp ? inp.value : true);
    if(inp){
      setTimeout(()=>{ inp.focus(); inp.select(); }, 60);
      inp.addEventListener('keydown',e=>{ if(e.key==='Enter') ok(); });
    }
    ov.onclick=e=>{ if(e.target===ov) close(null); };
    ov.querySelector('[data-a="ok"]').onclick=ok;
    ov.querySelector('[data-a="x"]').onclick=()=>close(null);
  });
}
function uiPrompt(title, placeholder, value){
  return uiDialog({title, input:true, placeholder:placeholder||'', value:value||''});
}
async function uiConfirm(title){
  return (await uiDialog({title, danger:true})) === true;
}
/* ═══════════ 键盘防遮挡 ═══════════ */
function easeKeyboard(ta){
  ta.addEventListener('focus',()=>{
    const host = ta.closest('.sheet') || document.body;
    host.style.paddingBottom='45vh';
    setTimeout(()=>{ try{ ta.scrollIntoView({block:'center',behavior:'smooth'}); }catch(e){} }, 250);
    const restore=()=>{ host.style.paddingBottom=''; ta.removeEventListener('blur',restore); };
    ta.addEventListener('blur',restore);
  });
}

/* ═══════════ 滑动手势 ═══════════ */
let swX=0, swY=0, swOK=false;
document.addEventListener('touchstart', e=>{
  const t=e.target;
  swOK = !editMode
    && !t.closest('.tags') && !t.closest('.overlay')
    && !t.closest('textarea') && !t.closest('input');
  swX=e.touches[0].clientX; swY=e.touches[0].clientY;
}, {passive:true});
document.addEventListener('touchend', e=>{
  if(!swOK) return;
  const dx=e.changedTouches[0].clientX-swX, dy=e.changedTouches[0].clientY-swY;
  if(Math.abs(dx)<70 || Math.abs(dx)<Math.abs(dy)*1.8) return;
  const order=['record','stats','me'];
  let i=order.indexOf(curPage) + (dx<0?1:-1);
  if(i>=0 && i<order.length) switchPage(order[i]);
}, {passive:true});
(function(){
  const sh=$('calSheet');
  let x0=0, y0=0;
  sh.addEventListener('touchstart', e=>{ x0=e.touches[0].clientX; y0=e.touches[0].clientY; }, {passive:true});
  sh.addEventListener('touchend', e=>{
    if(calTag) return;
    if(sh.querySelector('#ddTa')) return;                 // 当日日记页不翻
    if(e.target.closest('textarea')) return;
    const dx=e.changedTouches[0].clientX-x0, dy=e.changedTouches[0].clientY-y0;
    if(Math.abs(dx)<70 || Math.abs(dx)<Math.abs(dy)*1.8) return;
    if(calView==='week'){ calWeekStart=shiftDay(calWeekStart, dx<0?7:-7); }
    else { calMonth=shiftMonth(calMonth, dx<0?1:-1); }
    renderCal();
  }, {passive:true});
})();
